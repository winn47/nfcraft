<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profil Sozlamalari — NFCraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" href="./555ppp.jpg" type="image/jpeg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --surface: #141414;
  --surface2:#1e1e1e;
  --surface3:#252525;
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #f0f0f0;
  --muted:   #666;
  --muted2:  #999;
  --accent:  #e8ff47;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.ps-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.ps-back {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: transparent;
  border: none;
  color: var(--muted2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  padding: 0.4rem 0.7rem;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
}
.ps-back:hover { color: var(--text); background: var(--surface2); }

.ps-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.01em;
}

.ps-save {
  background: var(--accent);
  border: none;
  color: #000;
  font-family: 'Syne', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  padding: 0.5rem 1.1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  letter-spacing: 0.01em;
}
.ps-save:hover { transform: scale(1.03); }
.ps-save:active { opacity: 0.8; }
.ps-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Main layout ── */
.ps-main {
  flex: 1;
  display: grid;
  grid-template-columns: 380px 1fr;
  min-height: 0;
}

@media (max-width: 860px) {
  .ps-main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
}

/* ── Left panel ── */
.ps-left {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 0 0 2rem;
}

@media (max-width: 860px) {
  .ps-left { order: 2; border-right: none; border-top: 1px solid var(--border); }
}

.ps-section { border-bottom: 1px solid var(--border); }

.ps-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.1rem;
  cursor: pointer;
  user-select: none;
}
.ps-section-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.ps-section-arrow {
  font-size: 0.8rem;
  color: var(--muted);
  transition: transform 0.2s;
}
.ps-section.open .ps-section-arrow { transform: rotate(180deg); }
.ps-section-body { display: none; padding: 0.2rem 0.7rem 0.8rem; }
.ps-section.open .ps-section-body { display: block; }

/* ── Gradient preset item ── */
.preset-item {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0.6rem 0.5rem;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.preset-item:hover { background: var(--surface2); }
.preset-item.active { background: rgba(232,255,71,0.07); }
.preset-item.active::after {
  content: '✓';
  position: absolute;
  right: 0.8rem;
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 700;
}

.preset-swatch {
  width: 42px;
  height: 42px;
  border-radius: 9px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.preset-swatch.animated-swatch {
  animation: swatch-shift 3s ease infinite;
  background-size: 200% 200% !important;
}
@keyframes swatch-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.preset-info { flex: 1; min-width: 0; }
.preset-name {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.1rem;
}
.preset-desc {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Color grid ── */
.color-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
  padding: 0.2rem 0;
}
.color-dot {
  aspect-ratio: 1;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.color-dot:hover { transform: scale(1.1); }
.color-dot.active {
  border-color: rgba(255,255,255,0.8);
  box-shadow: 0 0 0 3px rgba(232,255,71,0.4);
}
.color-dot.active::after {
  content: '✓';
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.color-label {
  font-size: 0.65rem;
  color: var(--muted);
  text-align: center;
  margin-top: 0.3rem;
}

/* ── Frame grid ── */
.frame-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}
.frame-item {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.55rem 0.65rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.frame-item:hover { background: var(--surface2); border-color: var(--border2); }
.frame-item.active { border-color: rgba(232,255,71,0.5); background: rgba(232,255,71,0.05); }
.frame-avatar-preview {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  overflow: hidden;
}
.frame-item-name {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.2;
}
.frame-item-desc {
  font-size: 0.65rem;
  color: var(--muted);
  line-height: 1.2;
  margin-top: 0.1rem;
}

/* ── Right panel / Preview ── */
.ps-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem 3rem;
  overflow-y: auto;
  background: var(--bg);
}

@media (max-width: 860px) {
  .ps-right { order: 1; padding: 1.5rem 1rem; min-height: 520px; }
}

.preview-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
  text-align: center;
}

.preview-url {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.45rem 0.85rem;
  margin-bottom: 1.4rem;
  font-size: 0.8rem;
  color: var(--muted2);
  max-width: 340px;
  width: 100%;
}
.preview-url a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  font-size: 0.78rem;
  margin-left: auto;
}

/* ── Mini card preview ── */
.mini-card {
  width: 100%;
  max-width: 340px;
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transition: background 0.4s;
  min-height: 480px;
  display: flex;
  flex-direction: column;
}

.mini-card-bg {
  padding: 2rem 1.4rem 1.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.4s, color 0.3s;
  flex: 1;
}

.mini-avatar-wrap {
  width: 80px;
  height: 80px;
  position: relative;
  margin-bottom: 1rem;
}

.mini-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.mini-avatar img { width: 100%; height: 100%; object-fit: cover; }

.mini-name {
  font-family: 'Syne', sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  margin-bottom: 0.2rem;
  text-align: center;
  transition: color 0.3s;
}
.mini-plan {
  font-size: 0.72rem;
  opacity: 0.6;
  margin-bottom: 1.2rem;
  text-align: center;
}

.mini-fields {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
}
.mini-field {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 0.7rem 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.65rem;
  font-size: 0.88rem;
  color: inherit;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.mini-field-icon {
  font-size: 1rem;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.1);
  border-radius: 7px;
  flex-shrink: 0;
}
.mini-field-text { flex: 1; min-width: 0; }
.mini-field-type {
  font-size: 0.6rem;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 0.1rem;
}
.mini-field-val {
  font-size: 0.82rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mini-card-footer {
  background: rgba(0,0,0,0.25);
  padding: 0.6rem;
  text-align: center;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.06em;
  backdrop-filter: blur(8px);
}

/* ─── Avatar Frame CSS ─── */
.frame-chrome-ring .mini-avatar {
  border: 3px solid transparent;
  background-clip: padding-box, border-box;
  background-origin: padding-box, border-box;
  background-image:
    linear-gradient(var(--surface2), var(--surface2)),
    linear-gradient(135deg, #c0c0c0, #e8e8e8 40%, #888 60%, #e8e8e8);
  box-shadow: 0 0 12px rgba(200,200,200,0.35);
}

.frame-neon-spray .mini-avatar {
  border: 3px solid #e8ff47;
  box-shadow: 0 0 8px #e8ff47, 0 0 18px rgba(232,255,71,0.5);
  animation: neon-pulse 2s ease-in-out infinite;
}
@keyframes neon-pulse {
  0%,100% { box-shadow: 0 0 8px #e8ff47, 0 0 18px rgba(232,255,71,0.5); }
  50%      { box-shadow: 0 0 3px #e8ff47, 0 0 8px rgba(232,255,71,0.3); }
}

.frame-chain-link .mini-avatar {
  border: 4px solid #aaa;
  box-shadow: 0 0 0 2px #555, 0 0 0 5px #aaa, 0 0 0 7px #444;
}

.frame-starburst .mini-avatar-wrap::before {
  content: '';
  position: absolute;
  inset: -8px;
  background: conic-gradient(
    #e8ff47 0deg, #111 15deg, #e8ff47 30deg, #111 45deg, #e8ff47 60deg, #111 75deg,
    #e8ff47 90deg, #111 105deg, #e8ff47 120deg, #111 135deg, #e8ff47 150deg, #111 165deg,
    #e8ff47 180deg, #111 195deg, #e8ff47 210deg, #111 225deg, #e8ff47 240deg, #111 255deg,
    #e8ff47 270deg, #111 285deg, #e8ff47 300deg, #111 315deg, #e8ff47 330deg, #111 345deg, #e8ff47 360deg
  );
  border-radius: 50%;
  z-index: -1;
  animation: star-rotate 8s linear infinite;
}
@keyframes star-rotate { to { transform: rotate(360deg); } }

.frame-tape-collage .mini-avatar {
  border: none;
  outline: 5px solid #f5f0e8;
  outline-offset: 3px;
  transform: rotate(2deg);
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
}

.frame-pixel-glow .mini-avatar {
  border: 3px solid #00ff41;
  box-shadow: 4px 4px 0 #00ff41, -4px -4px 0 #ff00e4, 4px -4px 0 #00ffff, -4px 4px 0 #00ff41;
  image-rendering: pixelated;
}

.frame-drip-outline .mini-avatar {
  border: 3px solid #FF6B00;
  box-shadow: 0 6px 20px rgba(255,107,0,0.5);
  filter: drop-shadow(0 8px 10px rgba(255,107,0,0.4));
}

.frame-orbit-dots .mini-avatar-wrap::after {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: conic-gradient(
    #e8ff47 0%, transparent 18%, #e8ff47 36%, transparent 54%, #e8ff47 72%, transparent 90%, #e8ff47 100%
  );
  mask: radial-gradient(circle, transparent 34px, black 36px, black 39px, transparent 41px);
  -webkit-mask: radial-gradient(circle, transparent 34px, black 36px, black 39px, transparent 41px);
  animation: orbit-spin 3s linear infinite;
}
@keyframes orbit-spin { to { transform: rotate(360deg); } }

/* ─── Background animations ─── */
.bg-graffiti-neon {
  background: linear-gradient(-45deg, #ff006e, #8338ec, #3a86ff, #06ffa5) !important;
  background-size: 400% 400% !important;
  animation: gradient-shift 4s ease infinite;
}
@keyframes gradient-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.bg-pixel-glow {
  background: #050d05 !important;
  animation: pixel-bg-pulse 3s ease infinite;
  position: relative;
}
.bg-pixel-glow::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,255,65,0.03) 0px, rgba(0,255,65,0.03) 1px, transparent 1px, transparent 4px),
              repeating-linear-gradient(90deg, rgba(0,255,65,0.03) 0px, rgba(0,255,65,0.03) 1px, transparent 1px, transparent 4px);
  pointer-events: none;
}
@keyframes pixel-bg-pulse {
  0%,100% { box-shadow: inset 0 0 50px rgba(0,255,65,0.1); }
  50%      { box-shadow: inset 0 0 100px rgba(0,255,65,0.25); }
}

.bg-orbit-dots {
  background: #0a0a2e !important;
  position: relative;
  overflow: hidden;
}
.bg-orbit-dots::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: radial-gradient(circle at 20% 30%, rgba(232,255,71,0.08) 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(100,100,255,0.08) 0%, transparent 40%);
  animation: dots-drift 6s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes dots-drift {
  0%   { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(10%, 5%) rotate(5deg); }
}

.bg-liquid-glass {
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* Toast */
.ps-toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid rgba(232,255,71,0.3);
  color: var(--accent);
  padding: 0.65rem 1.4rem;
  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
}
.ps-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.ps-loading {
  text-align: center;
  color: var(--muted);
  padding: 3rem;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<!-- Header -->
<header class="ps-header">
  <button class="ps-back" onclick="goBack()">← Orqaga</button>
  <span class="ps-title">Profil Sozlamalari</span>
  <button class="ps-save" id="saveBtn" onclick="saveSettings()">Saqlash →</button>
</header>

<!-- Main -->
<div class="ps-main" id="psMain">
  <!-- Left panel -->
  <div class="ps-left" id="psLeft">

    <!-- GRADIENT PRESETS -->
    <div class="ps-section open" id="sec-gradient">
      <div class="ps-section-header" onclick="toggleSection('sec-gradient')">
        <span class="ps-section-label">Gradient Presets</span>
        <span class="ps-section-arrow">▾</span>
      </div>
      <div class="ps-section-body" id="gradient-list"></div>
    </div>

    <!-- COLOR PRESETS -->
    <div class="ps-section open" id="sec-color">
      <div class="ps-section-header" onclick="toggleSection('sec-color')">
        <span class="ps-section-label">Color Presets</span>
        <span class="ps-section-arrow">▾</span>
      </div>
      <div class="ps-section-body">
        <div class="color-grid" id="color-grid"></div>
      </div>
    </div>

    <!-- AVATAR FRAMES -->
    <div class="ps-section open" id="sec-frame">
      <div class="ps-section-header" onclick="toggleSection('sec-frame')">
        <span class="ps-section-label">Ramka Avatara</span>
        <span class="ps-section-arrow">▾</span>
      </div>
      <div class="ps-section-body">
        <div class="frame-grid" id="frame-grid"></div>
      </div>
    </div>

  </div>

  <!-- Right panel — live preview -->
  <div class="ps-right">
    <div class="preview-label">LIVE PREVIEW</div>
    <div class="preview-url" id="previewUrl">
      <span id="previewUrlText" style="color:var(--muted);font-size:0.77rem;">nfcraft.uz/card.html?uuid=...</span>
      <a id="previewOpenLink" href="#" target="_blank" rel="noopener" style="display:none;">Ochish ↗</a>
    </div>
    <div class="mini-card" id="miniCard">
      <div class="mini-card-bg" id="miniCardBg">
        <div class="mini-avatar-wrap" id="miniAvatarWrap">
          <div class="mini-avatar" id="miniAvatar">👤</div>
        </div>
        <div class="mini-name" id="miniName">Yuklanmoqda…</div>
        <div class="mini-plan" id="miniPlan">NFCraft Card</div>
        <div class="mini-fields" id="miniFields"></div>
      </div>
      <div class="mini-card-footer">Powered by NF<span style="color:var(--accent);">Craft</span></div>
    </div>
  </div>
</div>

<div class="ps-toast" id="psToast"></div>

<script>
const API = 'https://nfcraftbackend1-production.up.railway.app/api';

// ── Preset data ──────────────────────────────────────────────
const GRADIENT_PRESETS = [
  { id:'glacier-platinum',  name:'Glacier Platinum',  desc:'Cool silver premium',
    swatch:'linear-gradient(135deg,#c9d6df,#e2ebf0)', bg:'linear-gradient(135deg,#c9d6df 0%,#e2ebf0 50%,#bdc8cf 100%)', text:'#1a1a2e', type:'GRADIENT' },
  { id:'carrara-prestige',  name:'Carrara Prestige',  desc:'Monochrome luxury stone',
    swatch:'linear-gradient(135deg,#2c3e50,#4a6073)', bg:'linear-gradient(135deg,#2c3e50 0%,#4a6073 50%,#2c3e50 100%)', text:'#f0f0f0', type:'GRADIENT' },
  { id:'sage-luxe',         name:'Sage Luxe',         desc:'Fresh premium minimal',
    swatch:'linear-gradient(135deg,#74b49b,#a7c4bc)', bg:'linear-gradient(135deg,#4a7c59 0%,#74b49b 50%,#a7c4bc 100%)', text:'#fff', type:'GRADIENT' },
  { id:'golden-noir',       name:'Golden Noir',       desc:'Opulent deep noir',
    swatch:'linear-gradient(135deg,#1a1208,#4a3820)', bg:'linear-gradient(135deg,#0a0802 0%,#2d1f05 30%,#4a3820 60%,#2d1f05 100%)', text:'#d4a843', type:'GRADIENT' },
  { id:'velours-luxe',      name:'Velours Luxe',      desc:'Sophisticated velvet luxe',
    swatch:'linear-gradient(135deg,#4a0e2e,#722f57)', bg:'linear-gradient(135deg,#2d0a1c 0%,#4a0e2e 30%,#722f57 60%,#4a0e2e 100%)', text:'#f0c9d5', type:'GRADIENT' },
  { id:'emerald-reserve',   name:'Emerald Reserve',   desc:'Deep forest premium',
    swatch:'linear-gradient(135deg,#064e3b,#065f46)', bg:'linear-gradient(135deg,#022c22 0%,#064e3b 50%,#065f46 100%)', text:'#a7f3d0', type:'GRADIENT' },
  { id:'midnight-obsidian', name:'Midnight Obsidian', desc:'Dark premium depth',
    swatch:'linear-gradient(135deg,#0f172a,#1e293b)', bg:'linear-gradient(135deg,#0a0f1e 0%,#0f172a 50%,#1e293b 100%)', text:'#e2e8f0', type:'GRADIENT' },
  { id:'aurora-scriptum',   name:'Aurora Scriptum',   desc:'Luminous deep purple',
    swatch:'linear-gradient(135deg,#312e81,#7c3aed)', bg:'linear-gradient(135deg,#1e1b4b 0%,#312e81 30%,#4338ca 60%,#6d28d9 100%)', text:'#e9d5ff', type:'GRADIENT' },
  { id:'liquid-glass',      name:'Liquid Glass',      desc:'Frosted iOS glass',
    swatch:'linear-gradient(135deg,rgba(255,255,255,0.35),rgba(200,220,255,0.15))', bg:'linear-gradient(135deg,rgba(255,255,255,0.12) 0%,rgba(200,220,255,0.06) 100%)', text:'#f0f0f0', type:'GRADIENT', glass:true, baseBg:'#1a2a4a' },
  { id:'graffiti-neon',     name:'Graffiti Neon',     desc:'Street paint spray and drips',
    swatch:'linear-gradient(135deg,#ff006e,#8338ec,#3a86ff)', bg:null, text:'#fff', type:'ANIMATED', animClass:'bg-graffiti-neon' },
  { id:'pixel-glow',        name:'Pixel Glow',        desc:'Pixelated neon aura',
    swatch:'linear-gradient(135deg,#050d05,#00ff41)', bg:null, text:'#00ff41', type:'ANIMATED', animClass:'bg-pixel-glow' },
  { id:'orbit-dots',        name:'Orbit Dots',        desc:'Deep space orbiting',
    swatch:'linear-gradient(135deg,#0a0a2e,#e8ff47)', bg:null, text:'#e8ff47', type:'ANIMATED', animClass:'bg-orbit-dots' },
];

const COLOR_PRESETS = [
  { id:'orange', name:'Orange', color:'#f97316', text:'#fff', type:'SOLID' },
  { id:'green',  name:'Green',  color:'#22c55e', text:'#fff', type:'SOLID' },
  { id:'blue',   name:'Blue',   color:'#3b82f6', text:'#fff', type:'SOLID' },
  { id:'pink',   name:'Pink',   color:'#ec4899', text:'#fff', type:'SOLID' },
  { id:'red',    name:'Red',    color:'#ef4444', text:'#fff', type:'SOLID' },
  { id:'yellow', name:'Yellow', color:'#eab308', text:'#000', type:'SOLID' },
  { id:'teal',   name:'Teal',   color:'#14b8a6', text:'#fff', type:'SOLID' },
  { id:'purple', name:'Purple', color:'#a855f7', text:'#fff', type:'SOLID' },
];

const FRAME_PRESETS = [
  { id:'none',          name:"Bez ramki",    desc:'Standart', icon:'👤' },
  { id:'chrome-ring',   name:'Chrome Ring',  desc:'Metallic', icon:'⭕' },
  { id:'neon-spray',    name:'Neon Spray',   desc:'Neon glow', icon:'✨' },
  { id:'chain-link',    name:'Chain Link',   desc:'Chain', icon:'⛓' },
  { id:'starburst',     name:'Starburst',    desc:'Star burst', icon:'⭐' },
  { id:'tape-collage',  name:'Tape Collage', desc:'Collage', icon:'📎' },
  { id:'pixel-glow',    name:'Pixel Glow',   desc:'Pixel neon', icon:'🟩' },
  { id:'drip-outline',  name:'Drip Outline', desc:'Dripping', icon:'💧' },
  { id:'orbit-dots',    name:'Orbit Dots',   desc:'Orbiting', icon:'🔵' },
];

// ── State ────────────────────────────────────────────────────
let _uuid = null;
let _cardData = null;
let _currentBgType   = null;
let _currentBgValue  = null;
let _currentBgText   = '#f0f0f0';
let _currentBorder   = 'none';
let _currentGlow     = false;
let _currentAnimClass = null;

// ── Init ─────────────────────────────────────────────────────
(async function init() {
  const params = new URLSearchParams(location.search);
  _uuid = params.get('uuid');

  // If no UUID in URL, try to get from localStorage (set by main app)
  if (!_uuid) {
    _uuid = localStorage.getItem('myCardUuid');
  }

  if (!_uuid) {
    document.getElementById('miniName').textContent = 'UUID topilmadi';
    return;
  }

  renderGradients();
  renderColors();
  renderFrames();

  await loadCard();
})();

// ── Render preset lists ───────────────────────────────────────
function renderGradients() {
  const list = document.getElementById('gradient-list');
  list.innerHTML = GRADIENT_PRESETS.map(p => `
    <div class="preset-item" id="gp-${p.id}" onclick="selectBg('${p.id}','gradient')">
      <div class="preset-swatch ${p.animClass ? 'animated-swatch' : ''}" style="background:${p.swatch};"></div>
      <div class="preset-info">
        <div class="preset-name">${p.name}</div>
        <div class="preset-desc">${p.desc}</div>
      </div>
    </div>`).join('');
}

function renderColors() {
  const grid = document.getElementById('color-grid');
  grid.innerHTML = COLOR_PRESETS.map(c => `
    <div>
      <div class="color-dot" id="cp-${c.id}" onclick="selectBg('${c.id}','color')" style="background:${c.color};"></div>
      <div class="color-label">${c.name}</div>
    </div>`).join('');
}

function renderFrames() {
  const grid = document.getElementById('frame-grid');
  grid.innerHTML = FRAME_PRESETS.map(f => `
    <div class="frame-item" id="fp-${f.id}" onclick="selectFrame('${f.id}')">
      <div class="frame-avatar-preview frame-${f.id}">${f.icon}</div>
      <div>
        <div class="frame-item-name">${f.name}</div>
        <div class="frame-item-desc">${f.desc}</div>
      </div>
    </div>`).join('');
}

// ── Load card data ────────────────────────────────────────────
async function loadCard() {
  try {
    const res  = await fetch(`${API}/card-info/${_uuid}`);
    if (!res.ok) throw new Error('Karta topilmadi');
    _cardData  = await res.json();

    // Set preview URL
    const urlText = document.getElementById('previewUrlText');
    const urlLink = document.getElementById('previewOpenLink');
    urlText.textContent = `nfcraft.uz/card.html?uuid=${_uuid}`;
    urlLink.href = `card.html?uuid=${_uuid}`;
    urlLink.style.display = '';

    // Apply existing settings
    if (_cardData.bgType && _cardData.bgValue) {
      applyPresetFromApi(_cardData.bgType, _cardData.bgValue);
    } else {
      applyDefaultBackground();
    }
    if (_cardData.borderStyle) selectFrame(_cardData.borderStyle, false);

    renderMiniCard();

  } catch (err) {
    document.getElementById('miniName').textContent = err.message;
  }
}

function applyPresetFromApi(bgType, bgValue) {
  if (bgType === 'SOLID') {
    const preset = COLOR_PRESETS.find(c => c.color === bgValue || c.id === bgValue);
    if (preset) selectBg(preset.id, 'color', false);
    else {
      _currentBgType  = 'SOLID';
      _currentBgValue = bgValue;
      applyBgToPreview();
    }
  } else if (bgType === 'GRADIENT') {
    const preset = GRADIENT_PRESETS.find(p => p.id === bgValue || p.bg === bgValue);
    if (preset) selectBg(preset.id, 'gradient', false);
    else {
      _currentBgType  = 'GRADIENT';
      _currentBgValue = bgValue;
      applyBgToPreview();
    }
  } else if (bgType === 'ANIMATED') {
    const preset = GRADIENT_PRESETS.find(p => p.id === bgValue);
    if (preset) selectBg(preset.id, 'gradient', false);
  }
}

function applyDefaultBackground() {
  _currentBgType  = null;
  _currentBgValue = null;
  _currentBgText  = '#f0f0f0';
  const bg = document.getElementById('miniCardBg');
  bg.style.background = '#141414';
  bg.style.color = '#f0f0f0';
}

// ── Select background ─────────────────────────────────────────
function selectBg(id, group, updateActive = true) {
  // Remove active from all
  document.querySelectorAll('.preset-item.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.color-dot.active').forEach(el => el.classList.remove('active'));

  // Remove any animated classes from preview
  const bg = document.getElementById('miniCardBg');
  bg.classList.remove('bg-graffiti-neon', 'bg-pixel-glow', 'bg-orbit-dots', 'bg-liquid-glass');
  _currentAnimClass = null;

  if (group === 'gradient') {
    const preset = GRADIENT_PRESETS.find(p => p.id === id);
    if (!preset) return;
    if (updateActive) document.getElementById(`gp-${id}`)?.classList.add('active');

    _currentBgText = preset.text || '#f0f0f0';
    if (preset.type === 'ANIMATED') {
      _currentBgType  = 'ANIMATED';
      _currentBgValue = preset.id;
      _currentAnimClass = preset.animClass;
      bg.style.background = '';
      bg.classList.add(preset.animClass);
      bg.style.color = preset.text;
    } else {
      _currentBgType  = 'GRADIENT';
      _currentBgValue = preset.id;
      if (preset.glass && preset.baseBg) {
        bg.style.background = preset.baseBg;
        setTimeout(() => bg.classList.add('bg-liquid-glass'), 10);
      } else {
        bg.style.background = preset.bg;
        bg.classList.remove('bg-liquid-glass');
      }
      bg.style.color = preset.text;
    }
  } else {
    const preset = COLOR_PRESETS.find(c => c.id === id);
    if (!preset) return;
    if (updateActive) document.getElementById(`cp-${id}`)?.classList.add('active');

    _currentBgType  = 'SOLID';
    _currentBgValue = preset.color;
    _currentBgText  = preset.text;
    bg.classList.remove('bg-liquid-glass');
    bg.style.background = preset.color;
    bg.style.color = preset.text;
  }

  updateMiniFieldStyle();
}

function applyBgToPreview() {
  const bg = document.getElementById('miniCardBg');
  bg.style.background = _currentBgValue;
  bg.style.color = _currentBgText;
}

// ── Select frame ─────────────────────────────────────────────
function selectFrame(id, updateActive = true) {
  document.querySelectorAll('.frame-item.active').forEach(el => el.classList.remove('active'));
  if (updateActive) document.getElementById(`fp-${id}`)?.classList.add('active');

  const wrap = document.getElementById('miniAvatarWrap');
  const avatar = document.getElementById('miniAvatar');

  // Remove all frame classes
  wrap.className = 'mini-avatar-wrap';
  avatar.className = 'mini-avatar';

  _currentBorder = id;
  if (id !== 'none') {
    wrap.classList.add('frame-' + id);
    avatar.classList.add('frame-' + id);
  }
}

// ── Render mini card ──────────────────────────────────────────
function renderMiniCard() {
  if (!_cardData) return;

  document.getElementById('miniName').textContent = _cardData.ownerName || 'NFCraft';
  document.getElementById('miniPlan').textContent = (_cardData.plan || 'starter').toUpperCase() + ' PLAN';

  const avatarEl = document.getElementById('miniAvatar');
  if (_cardData.photo) {
    avatarEl.innerHTML = `<img src="${_cardData.photo}" alt="">`;
  }

  const fields = (_cardData.fields || []).slice(0, 3);
  const ICON_MAP = { Telegram:'✈️', Instagram:'📸', WhatsApp:'💬', Telefon:'📱', Email:'📧', Website:'🌐', LinkedIn:'💼', TikTok:'🎵', Manzil:'📍', Boshqa:'📋' };

  document.getElementById('miniFields').innerHTML = fields.map(f => `
    <div class="mini-field">
      <div class="mini-field-icon">${ICON_MAP[f.type]||'📋'}</div>
      <div class="mini-field-text">
        <div class="mini-field-type">${f.type}</div>
        <div class="mini-field-val">${f.value}</div>
      </div>
    </div>`).join('');
}

function updateMiniFieldStyle() {
  const fields = document.querySelectorAll('.mini-field');
  fields.forEach(f => {
    f.style.background = 'rgba(255,255,255,0.1)';
  });
}

// ── Section toggle ────────────────────────────────────────────
function toggleSection(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// ── Save ─────────────────────────────────────────────────────
async function saveSettings() {
  if (!_uuid) { showToast('UUID topilmadi', true); return; }

  const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
  if (!user?.token) { showToast('Iltimos, tizimga kiring', true); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saqlanmoqda…';

  try {
    const res = await fetch(`${API}/card-info/${_uuid}/settings`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${user.token}`
      },
      body: JSON.stringify({
        bgType:      _currentBgType,
        bgValue:     _currentBgValue,
        borderStyle: _currentBorder,
        glowEffect:  _currentGlow
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Xato');
    showToast('✓ Sozlamalar saqlandi!');
  } catch (err) {
    showToast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Saqlash →';
  }
}

// ── Utilities ─────────────────────────────────────────────────
function showToast(msg, isErr = false) {
  const t = document.getElementById('psToast');
  t.textContent = msg;
  t.style.borderColor = isErr ? 'rgba(255,80,80,0.4)' : 'rgba(232,255,71,0.3)';
  t.style.color = isErr ? '#ff6b6b' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function goBack() {
  if (_cardData) {
    location.href = `card.html?uuid=${_uuid}`;
  } else {
    history.back();
  }
}
</script>
</body>
</html>
