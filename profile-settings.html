<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profil Sozlamalari — NFCraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" href="./555ppp.jpg" type="image/jpeg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --surface: #141414;
  --surface2:#1e1e1e;
  --surface3:#252525;
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #f0f0f0;
  --muted:   #666;
  --muted2:  #999;
  --accent:  #e8ff47;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.ps-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.ps-back {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: transparent;
  border: none;
  color: var(--muted2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  padding: 0.4rem 0.7rem;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
}
.ps-back:hover { color: var(--text); background: var(--surface2); }

.ps-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.01em;
}

.ps-save {
  background: var(--accent);
  border: none;
  color: #000;
  font-family: 'Syne', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  padding: 0.5rem 1.1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  letter-spacing: 0.01em;
}
.ps-save:hover { transform: scale(1.03); }
.ps-save:active { opacity: 0.8; }
.ps-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Main layout ── */
.ps-main {
  flex: 1;
  display: grid;
  grid-template-columns: 380px 1fr;
  min-height: 0;
}

@media (max-width: 860px) {
  .ps-main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
}

/* ── Left panel ── */
.ps-left {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 0 0 2rem;
}

@media (max-width: 860px) {
  .ps-left { order: 2; border-right: none; border-top: 1px solid var(--border); }
}

.ps-section { border-bottom: 1px solid var(--border); }

.ps-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1.1rem;
  cursor: pointer;
  user-select: none;
}
.ps-section-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}
.ps-section-arrow {
  font-size: 0.8rem;
  color: var(--muted);
  transition: transform 0.2s;
}
.ps-section.open .ps-section-arrow { transform: rotate(180deg); }
.ps-section-body { display: none; padding: 0.2rem 0.7rem 0.8rem; }
.ps-section.open .ps-section-body { display: block; }

/* ── Gradient preset item ── */
.preset-item {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0.6rem 0.5rem;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.preset-item:hover { background: var(--surface2); }
.preset-item.active { background: rgba(232,255,71,0.07); }
.preset-item.active::after {
  content: '✓';
  position: absolute;
  right: 0.8rem;
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 700;
}

.preset-swatch {
  width: 42px;
  height: 42px;
  border-radius: 9px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}
.preset-swatch.animated-swatch {
  animation: swatch-shift 3s ease infinite;
  background-size: 200% 200% !important;
}
@keyframes swatch-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.preset-info { flex: 1; min-width: 0; }
.preset-name {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.1rem;
}
.preset-desc {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Color grid ── */
.color-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
  padding: 0.2rem 0;
}
.color-dot {
  aspect-ratio: 1;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.color-dot:hover { transform: scale(1.1); }
.color-dot.active {
  border-color: rgba(255,255,255,0.8);
  box-shadow: 0 0 0 3px rgba(232,255,71,0.4);
}
.color-dot.active::after {
  content: '✓';
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.color-label {
  font-size: 0.65rem;
  color: var(--muted);
  text-align: center;
  margin-top: 0.3rem;
}

/* ── Frame grid ── */
.frame-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
}
.frame-item {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.55rem 0.65rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.frame-item:hover { background: var(--surface2); border-color: var(--border2); }
.frame-item.active { border-color: rgba(232,255,71,0.5); background: rgba(232,255,71,0.05); }
.frame-avatar-preview {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
  overflow: hidden;
}
.frame-item-name {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.2;
}
.frame-item-desc {
  font-size: 0.65rem;
  color: var(--muted);
  line-height: 1.2;
  margin-top: 0.1rem;
}

/* ── Right panel / Preview ── */
.ps-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem 3rem;
  overflow-y: auto;
  background: var(--bg);
}

@media (max-width: 860px) {
  .ps-right { order: 1; padding: 1.5rem 1rem; min-height: 520px; }
}

.preview-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
  text-align: center;
}

.preview-url {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.45rem 0.85rem;
  margin-bottom: 1.4rem;
  font-size: 0.8rem;
  color: var(--muted2);
  max-width: 340px;
  width: 100%;
}
.preview-url a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  font-size: 0.78rem;
  margin-left: auto;
}

/* ── Mini card preview ── */
.mini-card {
  width: 100%;
  max-width: 340px;
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transition: background 0.4s;
  min-height: 480px;
  display: flex;
  flex-direction: column;
}

.mini-card-bg {
  padding: 2rem 1.4rem 1.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.4s, color 0.3s;
  flex: 1;
}

.mini-avatar-wrap {
  width: 80px;
  height: 80px;
  position: relative;
  margin-bottom: 1rem;
}

.mini-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.mini-avatar img { width: 100%; height: 100%; object-fit: cover; }

.mini-name {
  font-family: 'Syne', sans-serif;
  font-size: 1.35rem;
  font-weight: 700;
  margin-bottom: 0.2rem;
  text-align: center;
  transition: color 0.3s;
}
.mini-plan {
  font-size: 0.72rem;
  opacity: 0.6;
  margin-bottom: 1.2rem;
  text-align: center;
}

.mini-fields {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
}
.mini-field {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 0.7rem 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.65rem;
  font-size: 0.88rem;
  color: inherit;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.mini-field-icon {
  font-size: 1rem;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.1);
  border-radius: 7px;
  flex-shrink: 0;
}
.mini-field-text { flex: 1; min-width: 0; }
.mini-field-type {
  font-size: 0.6rem;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 0.1rem;
}
.mini-field-val {
  font-size: 0.82rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mini-card-footer {
  background: rgba(0,0,0,0.25);
  padding: 0.6rem;
  text-align: center;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.06em;
  backdrop-filter: blur(8px);
}

/* ─── Avatar Frame CSS ─── */
.frame-chrome-ring .mini-avatar {
  border: 3px solid transparent;
  background-clip: padding-box, border-box;
  background-origin: padding-box, border-box;
  background-image:
    linear-gradient(var(--surface2), var(--surface2)),
    linear-gradient(135deg, #c0c0c0, #e8e8e8 40%, #888 60%, #e8e8e8);
  box-shadow: 0 0 12px rgba(200,200,200,0.35);
}

.frame-neon-spray .mini-avatar {
  border: 3px solid #e8ff47;
  box-shadow: 0 0 8px #e8ff47, 0 0 18px rgba(232,255,71,0.5);
  animation: neon-pulse 2s ease-in-out infinite;
}
@keyframes neon-pulse {
  0%,100% { box-shadow: 0 0 8px #e8ff47, 0 0 18px rgba(232,255,71,0.5); }
  50%      { box-shadow: 0 0 3px #e8ff47, 0 0 8px rgba(232,255,71,0.3); }
}

.frame-chain-link .mini-avatar {
  border: 4px solid #aaa;
  box-shadow: 0 0 0 2px #555, 0 0 0 5px #aaa, 0 0 0 7px #444;
}

.frame-starburst .mini-avatar-wrap::before {
  content: '';
  position: absolute;
  inset: -8px;
  background: conic-gradient(
    #e8ff47 0deg, #111 15deg, #e8ff47 30deg, #111 45deg, #e8ff47 60deg, #111 75deg,
    #e8ff47 90deg, #111 105deg, #e8ff47 120deg, #111 135deg, #e8ff47 150deg, #111 165deg,
    #e8ff47 180deg, #111 195deg, #e8ff47 210deg, #111 225deg, #e8ff47 240deg, #111 255deg,
    #e8ff47 270deg, #111 285deg, #e8ff47 300deg, #111 315deg, #e8ff47 330deg, #111 345deg, #e8ff47 360deg
  );
  border-radius: 50%;
  z-index: -1;
  animation: star-rotate 8s linear infinite;
}
@keyframes star-rotate { to { transform: rotate(360deg); } }

.frame-tape-collage .mini-avatar {
  border: none;
  outline: 5px solid #f5f0e8;
  outline-offset: 3px;
  transform: rotate(2deg);
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
}

.frame-pixel-glow .mini-avatar {
  border: 3px solid #00ff41;
  box-shadow: 4px 4px 0 #00ff41, -4px -4px 0 #ff00e4, 4px -4px 0 #00ffff, -4px 4px 0 #00ff41;
  image-rendering: pixelated;
}

.frame-drip-outline .mini-avatar {
  border: 3px solid #FF6B00;
  box-shadow: 0 6px 20px rgba(255,107,0,0.5);
  filter: drop-shadow(0 8px 10px rgba(255,107,0,0.4));
}

.frame-orbit-dots .mini-avatar-wrap::after {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  background: conic-gradient(
    #e8ff47 0%, transparent 18%, #e8ff47 36%, transparent 54%, #e8ff47 72%, transparent 90%, #e8ff47 100%
  );
  mask: radial-gradient(circle, transparent 34px, black 36px, black 39px, transparent 41px);
  -webkit-mask: radial-gradient(circle, transparent 34px, black 36px, black 39px, transparent 41px);
  animation: orbit-spin 3s linear infinite;
}
@keyframes orbit-spin { to { transform: rotate(360deg); } }

/* ─── Background animations ─── */
.bg-graffiti-neon {
  background: linear-gradient(-45deg, #ff006e, #8338ec, #3a86ff, #06ffa5) !important;
  background-size: 400% 400% !important;
  animation: gradient-shift 4s ease infinite;
}
@keyframes gradient-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.bg-pixel-glow {
  background: #050d05 !important;
  animation: pixel-bg-pulse 3s ease infinite;
  position: relative;
}
.bg-pixel-glow::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,255,65,0.03) 0px, rgba(0,255,65,0.03) 1px, transparent 1px, transparent 4px),
              repeating-linear-gradient(90deg, rgba(0,255,65,0.03) 0px, rgba(0,255,65,0.03) 1px, transparent 1px, transparent 4px);
  pointer-events: none;
}
@keyframes pixel-bg-pulse {
  0%,100% { box-shadow: inset 0 0 50px rgba(0,255,65,0.1); }
  50%      { box-shadow: inset 0 0 100px rgba(0,255,65,0.25); }
}

.bg-orbit-dots {
  background: #0a0a2e !important;
  position: relative;
  overflow: hidden;
}
.bg-orbit-dots::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: radial-gradient(circle at 20% 30%, rgba(232,255,71,0.08) 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(100,100,255,0.08) 0%, transparent 40%);
  animation: dots-drift 6s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes dots-drift {
  0%   { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(10%, 5%) rotate(5deg); }
}

.bg-liquid-glass {
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* ─── NEW animated backgrounds ─── */
.bg-cyber-punk {
  background: linear-gradient(-45deg, #0d0221, #4a0080, #ff00ff, #7b00ff) !important;
  background-size: 400% 400% !important;
  animation: gradient-shift 3s ease infinite;
}
.bg-solar-flare {
  background: linear-gradient(-45deg, #ff4500, #ff8c00, #ffd700, #ff4500) !important;
  background-size: 300% 300% !important;
  animation: gradient-shift 2.5s ease infinite;
}
.bg-neon-sunrise {
  background: linear-gradient(-45deg, #1a0533, #ff006e, #ff8c00, #fff200) !important;
  background-size: 400% 400% !important;
  animation: gradient-shift 4s ease infinite;
}

/* ─── NEW Frame CSS ─── */
.frame-rainbow-ring .mini-avatar {
  border: 3px solid transparent;
  background-clip: padding-box, border-box;
  background-origin: padding-box, border-box;
  background-image: linear-gradient(#141414, #141414),
    conic-gradient(#ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #8b00ff, #ff0000);
  animation: rainbow-spin 3s linear infinite;
}
@keyframes rainbow-spin {
  to { filter: hue-rotate(360deg); }
}

.frame-gold-luxury .mini-avatar {
  border: 4px solid transparent;
  background-clip: padding-box, border-box;
  background-origin: padding-box, border-box;
  background-image: linear-gradient(#141414, #141414),
    linear-gradient(135deg, #b8860b, #ffd700 30%, #daa520 50%, #ffd700 70%, #b8860b);
  box-shadow: 0 0 18px rgba(218,165,32,0.5), inset 0 0 8px rgba(218,165,32,0.2);
}

.frame-ice-ring .mini-avatar {
  border: 3px solid rgba(147,210,255,0.8);
  box-shadow: 0 0 12px rgba(147,210,255,0.6), 0 0 24px rgba(100,180,255,0.3), inset 0 0 8px rgba(147,210,255,0.15);
  background: rgba(147,210,255,0.05);
}

.frame-fire-ring .mini-avatar {
  border: 3px solid #ff4500;
  box-shadow: 0 0 8px #ff4500, 0 0 20px rgba(255,69,0,0.6), 0 0 40px rgba(255,140,0,0.3);
  animation: fire-pulse 1.5s ease-in-out infinite;
}
@keyframes fire-pulse {
  0%,100% { box-shadow: 0 0 8px #ff4500, 0 0 20px rgba(255,69,0,0.6), 0 0 40px rgba(255,140,0,0.3); }
  50%      { box-shadow: 0 0 4px #ff6600, 0 0 12px rgba(255,100,0,0.8), 0 0 24px rgba(255,165,0,0.5); }
}

.frame-vortex .mini-avatar-wrap::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: conic-gradient(#e8ff47, #00ffff, #ff00ff, #ff4500, #e8ff47);
  animation: vortex-spin 2s linear infinite;
  z-index: -1;
}
@keyframes vortex-spin { to { transform: rotate(360deg); } }
.frame-vortex .mini-avatar { border: 2px solid transparent; }

.frame-neon-pink .mini-avatar {
  border: 3px solid #ff1493;
  box-shadow: 0 0 10px #ff1493, 0 0 24px rgba(255,20,147,0.5), 0 0 48px rgba(255,20,147,0.2);
  animation: pink-pulse 2s ease-in-out infinite;
}
@keyframes pink-pulse {
  0%,100% { box-shadow: 0 0 10px #ff1493, 0 0 24px rgba(255,20,147,0.5); }
  50%      { box-shadow: 0 0 5px #ff1493, 0 0 12px rgba(255,20,147,0.3); }
}

.frame-diamond .mini-avatar {
  border: 3px solid transparent;
  background-clip: padding-box, border-box;
  background-origin: padding-box, border-box;
  background-image: linear-gradient(#141414, #141414),
    linear-gradient(135deg, #a8d8ea, #fff 30%, #b8d4e8 50%, #fff 70%, #a8d8ea);
  box-shadow: 0 0 20px rgba(168,216,234,0.4), 0 4px 15px rgba(100,180,220,0.3);
  transform: rotate(0deg);
}

.frame-double-ring .mini-avatar {
  border: 2px solid rgba(232,255,71,0.7);
  box-shadow: 0 0 0 4px rgba(232,255,71,0.15), 0 0 0 6px rgba(232,255,71,0.5), 0 0 0 9px rgba(232,255,71,0.1);
}

/* Toast */
.ps-toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid rgba(232,255,71,0.3);
  color: var(--accent);
  padding: 0.65rem 1.4rem;
  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
}
.ps-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.ps-loading {
  text-align: center;
  color: var(--muted);
  padding: 3rem;
  font-size: 0.9rem;
}

/* ── Custom color picker ── */
.custom-color-btn {
  display: flex; align-items: center; gap: 0.6rem;
  width: 100%; background: var(--surface2);
  border: 1.5px dashed rgba(255,255,255,0.15); border-radius: 10px;
  padding: 0.5rem 0.7rem; color: var(--muted2); font-size: 0.82rem;
  cursor: pointer; transition: border-color 0.2s; text-align: left;
}
.custom-color-btn:hover { border-color: rgba(232,255,71,0.4); color: var(--text); }
.cp-plus {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}
.cp-popup {
  display: none; margin-top: 0.6rem;
  background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 0.85rem; overflow: hidden;

// ── State ────────────────────────────────────────────────────
let _uuid = null;
let _cardData = null;
let _currentBgType   = null;
let _currentBgValue  = null;
let _currentBgText   = '#f0f0f0';
let _currentBorder   = 'none';
let _currentGlow     = false;
let _currentAnimClass = null;

// ── Init ─────────────────────────────────────────────────────
(async function init() {
  const params = new URLSearchParams(location.search);
  _uuid = params.get('uuid');

  // If no UUID in URL, try to get from localStorage (set by main app)
  if (!_uuid) {
    _uuid = localStorage.getItem('myCardUuid');
  }

  if (!_uuid) {
    document.getElementById('miniName').textContent = 'UUID topilmadi';
    return;
  }

  renderGradients();
  renderColors();
  renderFrames();

  await loadCard();
})();

// ── Render preset lists ───────────────────────────────────────
function renderGradients() {
  const list = document.getElementById('gradient-list');
  list.innerHTML = GRADIENT_PRESETS.map(p => `
    <div class="preset-item" id="gp-${p.id}" onclick="selectBg('${p.id}','gradient')">

      <div class="preset-info">
        <div class="preset-name">${p.name}</div>
        <div class="preset-desc">${p.desc}</div>
      </div>
    </div>`).join('');
}

function renderColors() {
  const grid = document.getElementById('color-grid');
  grid.innerHTML = COLOR_PRESETS.map(c => `
    <div>
      <div class="color-dot" id="cp-${c.id}" onclick="selectBg('${c.id}','color')" style="background:${c.color};"></div>

}

function renderFrames() {

// ── Load card data ────────────────────────────────────────────
async function loadCard() {
  try {
    const res  = await fetch(`${API}/card-info/${_uuid}`);
    if (!res.ok) throw new Error('Karta topilmadi');
    _cardData  = await res.json();


    // Apply existing settings
    if (_cardData.bgType && _cardData.bgValue) {
      applyPresetFromApi(_cardData.bgType, _cardData.bgValue);
    } else {
      applyDefaultBackground();
    }
    if (_cardData.borderStyle) selectFrame(_cardData.borderStyle, false);

    renderMiniCard();

  } catch (err) {
    document.getElementById('miniName').textContent = err.message;
  }
}

function applyPresetFromApi(bgType, bgValue) {
  if (bgType === 'SOLID') {
    const preset = COLOR_PRESETS.find(c => c.color === bgValue || c.id === bgValue);
    if (preset) selectBg(preset.id, 'color', false);
    else {
      _currentBgType  = 'SOLID';
      _currentBgValue = bgValue;
      applyBgToPreview();
    }
  } else if (bgType === 'GRADIENT') {
    const preset = GRADIENT_PRESETS.find(p => p.id === bgValue || p.bg === bgValue);
    if (preset) selectBg(preset.id, 'gradient', false);
    else {
      _currentBgType  = 'GRADIENT';
      _currentBgValue = bgValue;
      applyBgToPreview();
    }
  } else if (bgType === 'ANIMATED') {
    const preset = GRADIENT_PRESETS.find(p => p.id === bgValue);
    if (preset) selectBg(preset.id, 'gradient', false);
  }
}

function applyDefaultBackground() {
  _currentBgType  = null;
  _currentBgValue = null;
  _currentBgText  = '#f0f0f0';
  const bg = document.getElementById('miniCardBg');
  bg.style.background = '#141414';
  bg.style.color = '#f0f0f0';
}

// ── Select background ─────────────────────────────────────────
function selectBg(id, group, updateActive = true) {
  // Remove active from all
  document.querySelectorAll('.preset-item.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.color-dot.active').forEach(el => el.classList.remove('active'));

  // Remove any animated classes from preview
  const bg = document.getElementById('miniCardBg');
  bg.classList.remove('bg-graffiti-neon','bg-pixel-glow','bg-orbit-dots','bg-liquid-glass','bg-cyber-punk','bg-solar-flare','bg-neon-sunrise');
  _currentAnimClass = null;

  if (group === 'gradient') {
    const preset = GRADIENT_PRESETS.find(p => p.id === id);
    if (!preset) return;
    if (updateActive) document.getElementById(`gp-${id}`)?.classList.add('active');

    _currentBgText = preset.text || '#f0f0f0';
    if (preset.type === 'ANIMATED') {
      _currentBgType  = 'ANIMATED';
      _currentBgValue = preset.id;
      _currentAnimClass = preset.animClass;
      bg.style.background = '';
      bg.classList.add(preset.animClass);
      bg.style.color = preset.text;
    } else {
      _currentBgType  = 'GRADIENT';
      _currentBgValue = preset.id;
      if (preset.glass && preset.baseBg) {
        bg.style.background = preset.baseBg;
        setTimeout(() => bg.classList.add('bg-liquid-glass'), 10);
      } else {
        bg.style.background = preset.bg;
        bg.classList.remove('bg-liquid-glass');
      }
      bg.style.color = preset.text;
    }
  } else {
    const preset = COLOR_PRESETS.find(c => c.id === id);
    if (!preset) return;
    if (updateActive) document.getElementById(`cp-${id}`)?.classList.add('active');

    _currentBgType  = 'SOLID';
    _currentBgValue = preset.color;
    _currentBgText  = preset.text;
    bg.classList.remove('bg-liquid-glass');
    bg.style.background = preset.color;
    bg.style.color = preset.text;
  }

  updateMiniFieldStyle();
}

function applyBgToPreview() {
  const bg = document.getElementById('miniCardBg');
  bg.style.background = _currentBgValue;
  bg.style.color = _currentBgText;
}

function applyCustomColor(hex) {
  // Deactivate all presets
  document.querySelectorAll('.preset-item.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.color-dot.active').forEach(el => el.classList.remove('active'));
  const bg = document.getElementById('miniCardBg');
  bg.classList.remove('bg-graffiti-neon','bg-pixel-glow','bg-orbit-dots','bg-liquid-glass','bg-cyber-punk','bg-solar-flare','bg-neon-sunrise');

  // Detect light/dark
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const bright = (r*299 + g*587 + b*114)/1000;
  _currentBgText  = bright > 128 ? '#0a0a0a' : '#f0f0f0';
  _currentBgType  = 'SOLID';
  _currentBgValue = hex;
  _currentAnimClass = null;

  bg.style.background = hex;
  bg.style.color = _currentBgText;
  updateMiniFieldStyle();

  // Update dot in picker button
  const dot = document.getElementById('customColorDot');
  dot.style.display = 'block';
  dot.style.background = hex;
}

// ── Custom color picker logic ─────────────────────────────────

function hsbToHex(h, s, b) {
  s /= 100; b /= 100;
  const k = n => (n + h / 60) % 6;
  const f = n => b * (1 - s * Math.max(0, Math.min(k(n), 4 - k(n), 1)));
  return '#' + [f(5),f(3),f(1)].map(x => Math.round(x*255).toString(16).padStart(2,'0')).join('');
}

function hexToHsb(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  let h = 0;
  if (d) {
    if (max===r) h=((g-b)/d)%6; else if (max===g) h=(b-r)/d+2; else h=(r-g)/d+4;
    h = Math.round(h*60); if (h<0) h+=360;
  }
  return { h, s: max ? Math.round(d/max*100) : 0, v: Math.round(max*100) };
}

function cpUpdateUI() {
  document.getElementById('colorAreaHue').style.background = `hsl(${_cpHue},100%,50%)`;
  const cursor = document.getElementById('colorAreaCursor');
  cursor.style.left = _cpSat + '%';
  cursor.style.top = (100 - _cpBri) + '%';
  const hex = hsbToHex(_cpHue, _cpSat, _cpBri);
  document.getElementById('hexInput').value = hex;
  document.getElementById('hexColorPreview').style.background = hex;
  cursor.style.background = hex;
}

function cpGetPos(e, el) {
  const r = el.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: Math.max(0,Math.min(1,(cx-r.left)/r.width)), y: Math.max(0,Math.min(1,(cy-r.top)/r.height)) };
}

function cpStartDrag(e) {
  e.preventDefault(); _cpDragging = true;
  const pos = cpGetPos(e, document.getElementById('colorAreaWrap'));
  _cpSat = Math.round(pos.x*100); _cpBri = Math.round((1-pos.y)*100);
  cpUpdateUI();
}

function cpDrag(e) {
  if (!_cpDragging) return; e.preventDefault();
  const pos = cpGetPos(e, document.getElementById('colorAreaWrap'));
  _cpSat = Math.round(pos.x*100); _cpBri = Math.round((1-pos.y)*100);
  cpUpdateUI();
}

function cpHueChange(val) { _cpHue = parseInt(val); cpUpdateUI(); }

function cpHexInput(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    const {h,s,v} = hexToHsb(val); _cpHue=h; _cpSat=s; _cpBri=v; cpUpdateUI();
  }
}

function toggleColorPicker() {
  const popup = document.getElementById('customColorPopup');
  const isOpen = popup.style.display !== 'none';
  popup.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) cpUpdateUI();
}

function applyCustomColorFromPicker() {
  const hex = hsbToHex(_cpHue, _cpSat, _cpBri);
  applyCustomColor(hex);
  document.getElementById('customColorPopup').style.display = 'none';
}

document.addEventListener('mouseup', () => { _cpDragging = false; });
document.addEventListener('touchend', () => { _cpDragging = false; });

// ── Select frame ─────────────────────────────────────────────
const WRAP_FRAMES = ['starburst', 'orbit-dots', 'vortex'];

function selectFrame(id, updateActive = true) {
  document.querySelectorAll('.frame-item.active').forEach(el => el.classList.remove('active'));
  if (updateActive) document.getElementById(`fp-${id}`)?.classList.add('active');

  const wrap = document.getElementById('miniAvatarWrap');
  const avatar = document.getElementById('miniAvatar');

  wrap.className = 'mini-avatar-wrap';
  avatar.className = 'mini-avatar';

  _currentBorder = id;
  if (id !== 'none') {
    if (WRAP_FRAMES.includes(id)) {
      wrap.classList.add('frame-' + id);
    } else {
      wrap.classList.add('frame-' + id);
      avatar.classList.add('frame-' + id);
    }
  }
}

// ── Render mini card ──────────────────────────────────────────
function renderMiniCard() {
  if (!_cardData) return;

  document.getElementById('miniName').textContent = _cardData.ownerName || 'NFCraft';
  document.getElementById('miniPlan').textContent = (_cardData.plan || 'starter').toUpperCase() + ' PLAN';

  const avatarEl = document.getElementById('miniAvatar');
  if (_cardData.photo) {
    avatarEl.innerHTML = `<img src="${_cardData.photo}" alt="">`;
  }

  const fields = (_cardData.fields || []).slice(0, 3);
  const ICON_MAP = { Telegram:'✈️', Instagram:'📸', WhatsApp:'💬', Telefon:'📱', Email:'📧', Website:'🌐', LinkedIn:'💼', TikTok:'🎵', Manzil:'📍', Boshqa:'📋' };

  document.getElementById('miniFields').innerHTML = fields.map(f => `
    <div class="mini-field">
      <div class="mini-field-icon">${ICON_MAP[f.type]||'📋'}</div>
      <div class="mini-field-text">
        <div class="mini-field-type">${f.type}</div>
        <div class="mini-field-val">${f.value}</div>
      </div>
    </div>`).join('');
}

function updateMiniFieldStyle() {
  const fields = document.querySelectorAll('.mini-field');
  fields.forEach(f => {
    f.style.background = 'rgba(255,255,255,0.1)';
  });
}

// ── Section toggle ────────────────────────────────────────────
function toggleSection(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// ── Save ─────────────────────────────────────────────────────
async function saveSettings() {
  if (!_uuid) { showToast('UUID topilmadi', true); return; }

  const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
  if (!user?.token) { showToast('Iltimos, tizimga kiring', true); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saqlanmoqda…';

  try {
    const res = await fetch(`${API}/card-info/${_uuid}/settings`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${user.token}`
      },
      body: JSON.stringify({
        bgType:      _currentBgType,
        bgValue:     _currentBgValue,
        borderStyle: _currentBorder,
        glowEffect:  _currentGlow
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Xato');
    showToast('✓ Sozlamalar saqlandi!');
  } catch (err) {
    showToast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Saqlash →';
  }
}

// ── Utilities ─────────────────────────────────────────────────
function showToast(msg, isErr = false) {
  const t = document.getElementById('psToast');
  t.textContent = msg;
  t.style.borderColor = isErr ? 'rgba(255,80,80,0.4)' : 'rgba(232,255,71,0.3)';
  t.style.color = isErr ? '#ff6b6b' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function goBack() {
  if (_cardData) {
    location.href = `card.html?uuid=${_uuid}`;
  } else {
    history.back();
  }
}
</script>
