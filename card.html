<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NFCraft Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="icon" href="./555ppp.jpg" type="image/jpeg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0a;
    --surface: #141414;
    --surface2:#1a1a1a;
    --border:  rgba(255,255,255,0.08);
    --text:    #f0f0f0;
    --muted:   #666;
    --accent:  #e8ff47;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 5rem;
  }

  /* ── Brand ── */
  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 2.8rem;
    opacity: 0.45;
  }
  .brand span { color: var(--accent); opacity: 1; }

  /* ── Card wrapper ── */
  .card-wrap {
    width: 100%;
    max-width: 420px;
  }

  /* ── Profile header ── */
  .profile-header {
    text-align: center;
    margin-bottom: 1.8rem;
  }

  .profile-avatar {
    width: 88px; height: 88px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 1rem;
    border: 2px solid var(--border);
    display: none;
    box-shadow: 0 0 0 4px rgba(232,255,71,0.08);
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .card-owner {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 0.3rem;
  }

  /* ── Save button ── */
  .save-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    padding: 1rem 1.5rem;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 1.4rem;
    transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    box-shadow: 0 4px 24px rgba(232,255,71,0.25);
    letter-spacing: 0.01em;
  }
  .save-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,255,71,0.35); }
  .save-btn:active { transform: scale(0.97); opacity: 0.85; }
  .save-btn svg    { flex-shrink: 0; }

  /* ── Fields ── */
  .fields-list {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .field-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.85rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.18s, background 0.18s;
  }
  .field-item:hover { border-color: rgba(232,255,71,0.25); background: var(--surface2); }

  .field-icon {
    font-size: 1.2rem;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    flex-shrink: 0;
  }

  .field-text { flex: 1; min-width: 0; }

  .field-type {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 0.15rem;
  }

  .field-value {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .field-arrow {
    color: rgba(255,255,255,0.2);
    font-size: 1rem;
    flex-shrink: 0;
  }

  /* ── States ── */
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 3rem 0;
    font-size: 0.9rem;
  }
  .error-msg {
    text-align: center;
    color: #ff6b6b;
    padding: 3rem 0;
    font-size: 0.9rem;
  }

  /* ── Save feedback toast ── */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid rgba(232,255,71,0.25);
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.7rem 1.4rem;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Footer ── */
  .footer-note {
    display: block;
    margin-top: 3rem;
    text-align: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.06em;
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-note:hover { color: rgba(255,255,255,0.35); }
  .footer-note span { color: var(--accent); opacity: 0.5; }
  .footer-note:hover span { opacity: 0.85; }

  /* ── Edit button (owner only) ── */
  .edit-btn {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.75rem 1.5rem;
    background: transparent;
    border: 1px solid var(--border2, rgba(255,255,255,0.14));
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 0.7rem;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
  }
  .edit-btn:hover { border-color: var(--accent); background: rgba(232,255,71,0.05); }

  /* ── Dynamic background animations ── */
  .bg-graffiti-neon {
    background: linear-gradient(-45deg,#ff006e,#8338ec,#3a86ff,#06ffa5) !important;
    background-size: 400% 400% !important;
    animation: gradient-shift 4s ease infinite;
  }
  @keyframes gradient-shift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .bg-pixel-glow {
    background: #050d05 !important;
    animation: pixel-bg-pulse 3s ease infinite;
    position: relative;
  }
  .bg-pixel-glow::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg,rgba(0,255,65,0.03) 0px,rgba(0,255,65,0.03) 1px,transparent 1px,transparent 4px),
                repeating-linear-gradient(90deg,rgba(0,255,65,0.03) 0px,rgba(0,255,65,0.03) 1px,transparent 1px,transparent 4px);
    pointer-events: none;
    z-index: 0;
  }
  @keyframes pixel-bg-pulse {
    0%,100% { box-shadow: inset 0 0 80px rgba(0,255,65,0.1); }
    50%      { box-shadow: inset 0 0 150px rgba(0,255,65,0.25); }
  }
  .bg-orbit-dots {
    background: #0a0a2e !important;
    position: relative;
  }

  /* ── Avatar frame CSS ── */
  .frame-chrome-ring {
    border: 3px solid transparent !important;
    background-clip: padding-box, border-box !important;
    background-origin: padding-box, border-box !important;
    background-image: linear-gradient(#0a0a0a,#0a0a0a), linear-gradient(135deg,#c0c0c0,#e8e8e8 40%,#888 60%,#e8e8e8) !important;
    box-shadow: 0 0 14px rgba(200,200,200,0.35) !important;
  }
  .frame-neon-spray {
    border: 3px solid #e8ff47 !important;
    box-shadow: 0 0 10px #e8ff47, 0 0 22px rgba(232,255,71,0.5) !important;
    animation: neon-pulse 2s ease-in-out infinite;
  }
  @keyframes neon-pulse {
    0%,100% { box-shadow: 0 0 10px #e8ff47,0 0 22px rgba(232,255,71,0.5); }
    50%      { box-shadow: 0 0 4px #e8ff47,0 0 10px rgba(232,255,71,0.3); }
  }
  .frame-chain-link {
    border: 4px solid #aaa !important;
    box-shadow: 0 0 0 2px #555,0 0 0 6px #aaa,0 0 0 8px #444 !important;
  }
  .frame-tape-collage {
    border: none !important;
    outline: 5px solid #f5f0e8;
    outline-offset: 3px;
    transform: rotate(2deg);
    box-shadow: 2px 2px 8px rgba(0,0,0,0.4) !important;
  }
  .frame-pixel-glow {
    border: 3px solid #00ff41 !important;
    box-shadow: 4px 4px 0 #00ff41,-4px -4px 0 #ff00e4,4px -4px 0 #00ffff !important;
  }
  .frame-drip-outline {
    border: 3px solid #FF6B00 !important;
    box-shadow: 0 6px 22px rgba(255,107,0,0.5) !important;
    filter: drop-shadow(0 8px 10px rgba(255,107,0,0.4));
  }
  .frame-starburst-wrap::before {
    content: '';
    position: absolute;
    inset: -10px;
    background: conic-gradient(#e8ff47 0deg,#111 15deg,#e8ff47 30deg,#111 45deg,#e8ff47 60deg,#111 75deg,#e8ff47 90deg,#111 105deg,#e8ff47 120deg,#111 135deg,#e8ff47 150deg,#111 165deg,#e8ff47 180deg,#111 195deg,#e8ff47 210deg,#111 225deg,#e8ff47 240deg,#111 255deg,#e8ff47 270deg,#111 285deg,#e8ff47 300deg,#111 315deg,#e8ff47 330deg,#111 345deg,#e8ff47 360deg);
    border-radius: 50%;
    z-index: -1;
    animation: star-rotate 8s linear infinite;
  }
  @keyframes star-rotate { to { transform: rotate(360deg); } }
  .frame-orbit-dots-wrap::after {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    background: conic-gradient(#e8ff47 0%,transparent 18%,#e8ff47 36%,transparent 54%,#e8ff47 72%,transparent 90%,#e8ff47 100%);
    mask: radial-gradient(circle,transparent 40px,black 42px,black 46px,transparent 48px);
    -webkit-mask: radial-gradient(circle,transparent 40px,black 42px,black 46px,transparent 48px);
    animation: orbit-spin 3s linear infinite;
  }
  @keyframes orbit-spin { to { transform: rotate(360deg); } }

  /* ── New animated backgrounds ── */
  .bg-cyber-punk { background:linear-gradient(-45deg,#0d0221,#4a0080,#ff00ff,#7b00ff) !important; background-size:400% 400% !important; animation:gradient-shift 3s ease infinite; }
  .bg-solar-flare { background:linear-gradient(-45deg,#ff4500,#ff8c00,#ffd700,#ff4500) !important; background-size:300% 300% !important; animation:gradient-shift 2.5s ease infinite; }
  .bg-neon-sunrise { background:linear-gradient(-45deg,#1a0533,#ff006e,#ff8c00,#fff200) !important; background-size:400% 400% !important; animation:gradient-shift 4s ease infinite; }

  /* ── New frame CSS ── */
  .frame-rainbow-ring {
    border: 3px solid transparent !important;
    background-clip: padding-box, border-box !important;
    background-origin: padding-box, border-box !important;
    background-image: linear-gradient(#0a0a0a,#0a0a0a), conic-gradient(#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#8b00ff,#ff0000) !important;
    animation: rainbow-spin 3s linear infinite;
  }
  @keyframes rainbow-spin { to { filter: hue-rotate(360deg); } }
  .frame-gold-luxury {
    border: 4px solid transparent !important;
    background-clip: padding-box, border-box !important;
    background-origin: padding-box, border-box !important;
    background-image: linear-gradient(#0a0a0a,#0a0a0a), linear-gradient(135deg,#b8860b,#ffd700 30%,#daa520 50%,#ffd700 70%,#b8860b) !important;
    box-shadow: 0 0 18px rgba(218,165,32,0.5) !important;
  }
  .frame-ice-ring {
    border: 3px solid rgba(147,210,255,0.8) !important;
    box-shadow: 0 0 12px rgba(147,210,255,0.6), 0 0 24px rgba(100,180,255,0.3) !important;
  }
  .frame-fire-ring {
    border: 3px solid #ff4500 !important;
    box-shadow: 0 0 8px #ff4500, 0 0 20px rgba(255,69,0,0.6) !important;
    animation: fire-pulse 1.5s ease-in-out infinite;
  }
  @keyframes fire-pulse {
    0%,100% { box-shadow: 0 0 8px #ff4500, 0 0 20px rgba(255,69,0,0.6); }
    50%      { box-shadow: 0 0 4px #ff6600, 0 0 12px rgba(255,100,0,0.8); }
  }
  .frame-vortex-wrap::before {
    content:''; position:absolute; inset:-8px; border-radius:50%;
    background:conic-gradient(#e8ff47,#00ffff,#ff00ff,#ff4500,#e8ff47);
    animation:vortex-spin 2s linear infinite; z-index:-1;
  }
  @keyframes vortex-spin { to { transform:rotate(360deg); } }
  .frame-neon-pink {
    border: 3px solid #ff1493 !important;
    box-shadow: 0 0 10px #ff1493, 0 0 24px rgba(255,20,147,0.5) !important;
    animation: pink-pulse 2s ease-in-out infinite;
  }
  @keyframes pink-pulse {
    0%,100% { box-shadow:0 0 10px #ff1493,0 0 24px rgba(255,20,147,0.5); }
    50%      { box-shadow:0 0 5px #ff1493,0 0 12px rgba(255,20,147,0.3); }
  }
  .frame-diamond {
    border: 3px solid transparent !important;
    background-clip: padding-box, border-box !important;
    background-origin: padding-box, border-box !important;
    background-image: linear-gradient(#0a0a0a,#0a0a0a), linear-gradient(135deg,#a8d8ea,#fff 30%,#b8d4e8 50%,#fff 70%,#a8d8ea) !important;
    box-shadow: 0 0 20px rgba(168,216,234,0.4) !important;
  }
  .frame-double-ring {
    border: 2px solid rgba(232,255,71,0.7) !important;
    box-shadow: 0 0 0 4px rgba(232,255,71,0.15), 0 0 0 6px rgba(232,255,71,0.5), 0 0 0 9px rgba(232,255,71,0.1) !important;
  }
</style>
</head>
<body>

<div class="brand">NF<span>Craft</span></div>

<div class="card-wrap">

  <div class="profile-header">
    <div class="profile-avatar" id="profileAvatar">
      <img id="profileAvatarImg" src="" alt="">
    </div>
    <div class="card-owner" id="ownerName">Yuklanmoqda…</div>
  </div>

  <div class="fields-list" id="fieldsList">
    <div class="loading">Ma'lumotlar yuklanmoqda…</div>
  </div>

  <!-- Edit profile button (only visible to owner) -->
  <a class="edit-btn" id="editBtn" href="#" style="display:none;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Profilni sozlash
  </a>

  <!-- Save Contact button (hidden until data loads) -->
  <button class="save-btn" id="saveBtn" onclick="saveContact()" style="display:none;margin-top:0.5rem;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    Kontaktni telefonga saqlash
  </button>

</div>

<a class="footer-note" href="https://nfcraft.uz" target="_blank" rel="noopener noreferrer">Powered by NF<span>Craft</span> · nfcraft.uz</a>
<div class="toast" id="toast">✓ Kontakt saqlandi</div>

<script>
const ICON_MAP = {
  'Telegram':  '✈️',
  'Instagram': '📸',
  'WhatsApp':  '💬',
  'Telefon':   '📱',
  'Email':     '📧',
  'Website':   '🌐',
  'LinkedIn':  '💼',
  'TikTok':    '🎵',
  'YouTube':   '▶️',
  'Facebook':  '👥',
  'Twitter/X': '𝕏',
  'Manzil':    '📍',
  'Boshqa':    '📋'
};

const LINK_MAP = {
  'Telegram':  v => v.startsWith('http') ? v : `https://t.me/${v.replace('@','').trim()}`,
  'Instagram': v => v.startsWith('http') ? v : `https://instagram.com/${v.replace('@','').trim()}`,
  'WhatsApp':  v => `https://wa.me/${v.replace(/\D/g,'')}`,
  'Telefon':   v => `tel:${v}`,
  'Email':     v => `mailto:${v}`,
  'Website':   v => v.startsWith('http') ? v : `https://${v}`,
  'LinkedIn':  v => v.startsWith('http') ? v : `https://${v}`,
  'TikTok':    v => v.startsWith('http') ? v : `https://tiktok.com/@${v.replace('@','').trim()}`,
  'YouTube':   v => v.startsWith('http') ? v : `https://youtube.com/${v}`,
  'Facebook':  v => v.startsWith('http') ? v : `https://facebook.com/${v}`,
  'Twitter/X': v => v.startsWith('http') ? v : `https://x.com/${v.replace('@','').trim()}`,
};

let _cardData = null;

/* ── vCard builder ── */
function buildVCard(data) {
  const lines = ['BEGIN:VCARD', 'VERSION:3.0'];

  const name    = (data.ownerName || 'NFCraft User').trim();
  const parts   = name.split(/\s+/);
  const last    = parts.length > 1 ? parts[parts.length - 1] : '';
  const first   = parts.length > 1 ? parts.slice(0, -1).join(' ') : parts[0];
  lines.push(`FN:${name}`);
  lines.push(`N:${last};${first};;;`);

  if (data.fields) {
    data.fields.forEach(f => {
      const v = (f.value || '').trim();
      switch (f.type) {
        case 'Telefon':
          lines.push(`TEL;TYPE=CELL:${v}`);
          break;
        case 'WhatsApp':
          lines.push(`TEL;TYPE=CELL:${v}`);
          break;
        case 'Email':
          lines.push(`EMAIL;TYPE=INTERNET:${v}`);
          break;
        case 'Website':
          lines.push(`URL:${v.startsWith('http') ? v : 'https://' + v}`);
          break;
        case 'Manzil':
          lines.push(`ADR;TYPE=WORK:;;${v};;;;`);
          break;
        case 'Telegram': {
          const url = v.startsWith('http') ? v : `https://t.me/${v.replace('@','').trim()}`;
          lines.push(`URL;TYPE=Telegram:${url}`);
          break;
        }
        case 'Instagram': {
          const url = v.startsWith('http') ? v : `https://instagram.com/${v.replace('@','').trim()}`;
          lines.push(`URL;TYPE=Instagram:${url}`);
          break;
        }
        case 'LinkedIn':
          lines.push(`URL;TYPE=LinkedIn:${v.startsWith('http') ? v : 'https://' + v}`);
          break;
        case 'TikTok':
          lines.push(`URL;TYPE=TikTok:${v.startsWith('http') ? v : 'https://tiktok.com/@' + v.replace('@','').trim()}`);
          break;
        case 'YouTube':
          lines.push(`URL;TYPE=YouTube:${v.startsWith('http') ? v : 'https://youtube.com/' + v}`);
          break;
        case 'Facebook':
          lines.push(`URL;TYPE=Facebook:${v.startsWith('http') ? v : 'https://facebook.com/' + v}`);
          break;
        case 'Twitter/X':
          lines.push(`URL;TYPE=Twitter:${v.startsWith('http') ? v : 'https://x.com/' + v.replace('@','').trim()}`);
          break;
        default:
          lines.push(`NOTE:${f.type}: ${v}`);
      }
    });
  }

  lines.push('NOTE:NFCraft Smart NFC Card — nfcraft.uz');
  lines.push('END:VCARD');
  return lines.join('\r\n');
}

/* ── Trigger download ── */
function saveContact() {
  if (!_cardData) return;
  const vcf      = buildVCard(_cardData);
  const blob     = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  const url      = URL.createObjectURL(blob);
  const a        = document.createElement('a');
  a.href         = url;
  a.download     = (_cardData.ownerName || 'contact').replace(/\s+/g, '_') + '.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Load card data ── */
async function loadCard() {
  const params = new URLSearchParams(window.location.search);
  const uuid   = params.get('uuid');
  if (!uuid) {
    document.getElementById('fieldsList').innerHTML = '<div class="error-msg">UUID topilmadi.</div>';
    return;
  }

  try {
    const res  = await fetch(`https://nfcraftbackend1-production.up.railway.app/api/card-info/${uuid}`);
    if (!res.ok) throw new Error('Karta topilmadi');
    const data = await res.json();
    _cardData  = data;

    document.title = (data.ownerName || 'NFCraft') + ' — NFCraft Card';
    document.getElementById('ownerName').textContent = data.ownerName || '–';

    // Apply visual settings
    applyCardVisuals(data, uuid);

    if (data.photo) {
      const avatarEl  = document.getElementById('profileAvatar');
      const avatarImg = document.getElementById('profileAvatarImg');
      avatarImg.src          = data.photo;
      avatarEl.style.display = 'block';
    }

    /* Show save button only when fields exist */
    if (data.fields && data.fields.length) {
      document.getElementById('saveBtn').style.display = 'flex';
    }

    // Show edit button only if current user owns this card
    const me = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (me && data.userId && me.id === data.userId) {
      const editBtn = document.getElementById('editBtn');
      editBtn.href = `profile-settings.html?uuid=${uuid}`;
      editBtn.style.display = 'flex';
      localStorage.setItem('myCardUuid', uuid);
    }

    const list = document.getElementById('fieldsList');
    if (!data.fields || !data.fields.length) {
      list.innerHTML = '<div class="loading">Ma\'lumotlar yo\'q.</div>';
      return;
    }

    list.innerHTML = data.fields.map(f => {
      const icon   = ICON_MAP[f.type] || '📋';
      const linkFn = LINK_MAP[f.type];
      const href   = linkFn ? linkFn(f.value) : null;
      const tag    = href ? 'a' : 'div';
      const extra  = href ? `href="${href}" target="_blank" rel="noopener noreferrer"` : '';
      return `
        <${tag} class="field-item" ${extra}>
          <div class="field-icon">${icon}</div>
          <div class="field-text">
            <div class="field-type">${f.type}</div>
            <div class="field-value">${f.value}</div>
          </div>
          ${href ? '<div class="field-arrow">›</div>' : ''}
        </${tag}>`;
    }).join('');

  } catch (err) {
    document.getElementById('fieldsList').innerHTML = `<div class="error-msg">${err.message}</div>`;
    document.getElementById('ownerName').textContent = 'Xato';
  }
}

function applyCardVisuals(data, uuid) {
  const ANIMATED_CLASSES = {
    'graffiti-neon':'bg-graffiti-neon','pixel-glow':'bg-pixel-glow','orbit-dots':'bg-orbit-dots',
    'cyber-punk':'bg-cyber-punk','solar-flare':'bg-solar-flare','neon-sunrise':'bg-neon-sunrise'
  };
  const GRADIENT_MAP = {
    'glacier-platinum':  { bg:'linear-gradient(135deg,#c9d6df 0%,#e2ebf0 50%,#bdc8cf 100%)', text:'#1a1a2e' },
    'carrara-prestige':  { bg:'linear-gradient(135deg,#2c3e50 0%,#4a6073 50%,#2c3e50 100%)', text:'#f0f0f0' },
    'sage-luxe':         { bg:'linear-gradient(135deg,#4a7c59 0%,#74b49b 50%,#a7c4bc 100%)', text:'#fff' },
    'golden-noir':       { bg:'linear-gradient(135deg,#0a0802 0%,#2d1f05 30%,#4a3820 60%,#2d1f05 100%)', text:'#d4a843' },
    'velours-luxe':      { bg:'linear-gradient(135deg,#2d0a1c 0%,#4a0e2e 30%,#722f57 60%,#4a0e2e 100%)', text:'#f0c9d5' },
    'emerald-reserve':   { bg:'linear-gradient(135deg,#022c22 0%,#064e3b 50%,#065f46 100%)', text:'#a7f3d0' },
    'midnight-obsidian': { bg:'linear-gradient(135deg,#0a0f1e 0%,#0f172a 50%,#1e293b 100%)', text:'#e2e8f0' },
    'aurora-scriptum':   { bg:'linear-gradient(135deg,#1e1b4b 0%,#312e81 30%,#4338ca 60%,#6d28d9 100%)', text:'#e9d5ff' },
    'liquid-glass':      { bg:'#1a2a4a', text:'#f0f0f0' },
    'crimson-empire':    { bg:'linear-gradient(135deg,#2d0505 0%,#4a0a0a 30%,#8b1a1a 60%,#4a0a0a 100%)', text:'#fca5a5' },
    'ocean-depths':      { bg:'linear-gradient(135deg,#060f1e 0%,#0c2340 30%,#1a4a7a 60%,#0c2340 100%)', text:'#bae6fd' },
    'rose-gold':         { bg:'linear-gradient(135deg,#5c1f1f 0%,#c96a6a 40%,#e8b4b8 70%,#c96a6a 100%)', text:'#fff' },
    'nordic-frost':      { bg:'linear-gradient(135deg,#6ba3be 0%,#a8d8ea 50%,#e8f4f8 100%)', text:'#1a2a4a' },
    'volcanic-ash':      { bg:'linear-gradient(135deg,#0a0804 0%,#1a1208 30%,#3d2b1f 60%,#6b3a2a 100%)', text:'#f59e0b' },
    'jade-temple':       { bg:'linear-gradient(135deg,#001a12 0%,#003d2b 40%,#006b4a 70%,#003d2b 100%)', text:'#6ee7b7' },
    'arctic-aurora':     { bg:'linear-gradient(135deg,#03071e 0%,#0a2640 25%,#023e58 50%,#00b4d8 75%,#90e0ef 100%)', text:'#caf0f8' },
    'mahogany-dark':     { bg:'linear-gradient(135deg,#1a0a03 0%,#2d1206 35%,#5c2a14 65%,#8b3a1e 100%)', text:'#f5cba7' },
    'neon-sunset':       { bg:'linear-gradient(135deg,#6f2232 0%,#c06c84 30%,#f7c59f 60%,#ff6b35 100%)', text:'#fff' },
  };

  if (data.bgType && data.bgValue) {
    const body = document.body;
    if (data.bgType === 'ANIMATED') {
      const cls = ANIMATED_CLASSES[data.bgValue];
      if (cls) body.classList.add(cls);
    } else if (data.bgType === 'GRADIENT') {
      const gp = GRADIENT_MAP[data.bgValue];
      if (gp) {
        body.style.background = gp.bg;
        body.style.color = gp.text;
        // Update field items to use semi-transparent bg on light backgrounds
        if (gp.text === '#1a1a2e' || gp.text === '#000') {
          document.documentElement.style.setProperty('--text', gp.text);
          document.documentElement.style.setProperty('--surface', 'rgba(0,0,0,0.12)');
          document.documentElement.style.setProperty('--border', 'rgba(0,0,0,0.12)');
        } else {
          document.documentElement.style.setProperty('--surface', 'rgba(255,255,255,0.08)');
          document.documentElement.style.setProperty('--border', 'rgba(255,255,255,0.12)');
        }
      } else {
        body.style.background = data.bgValue;
      }
    } else if (data.bgType === 'SOLID') {
      body.style.background = data.bgValue;
      const hex = data.bgValue.replace('#','');
      const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
      const bright = (r*299 + g*587 + b*114)/1000;
      const textColor = bright > 128 ? '#0a0a0a' : '#f0f0f0';
      body.style.color = textColor;
      document.documentElement.style.setProperty('--text', textColor);
      document.documentElement.style.setProperty('--surface', bright > 128 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)');
      document.documentElement.style.setProperty('--border', bright > 128 ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.14)');
    }
  }

  // Apply avatar frame
  if (data.borderStyle && data.borderStyle !== 'none') {
    const avatar = document.getElementById('profileAvatar');
    const avatarWrap = avatar?.parentElement;
    const frameId = data.borderStyle;
    // Wrap-based frames (use ::before/::after on parent)
    const WRAP_FRAMES = { starburst:'frame-starburst-wrap', 'orbit-dots':'frame-orbit-dots-wrap', vortex:'frame-vortex-wrap' };
    if (WRAP_FRAMES[frameId] && avatarWrap) {
      avatarWrap.style.position = 'relative';
      avatarWrap.classList.add(WRAP_FRAMES[frameId]);
    } else {
      avatar?.classList.add('frame-' + frameId);
    }
  }
}

loadCard();
</script>
