<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NFCraft Stiker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="icon" href="./555ppp.jpg" type="image/jpeg">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0a0a0a;
    --surface: #141414;
    --surface2:#1a1a1a;
    --border:  rgba(255,255,255,0.08);
    --text:    #f0f0f0;
    --muted:   #666;
    --muted2:  #888;
    --accent:  #e8ff47;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 4rem;
  }

  /* ── Top bar ── */
  .top-bar {
    width: 100%; max-width: 480px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 1.4rem 0;
  }
  .brand { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .brand span { color: var(--accent); }
  .sticker-badge {
    background: rgba(232,255,71,0.1);
    border: 1px solid rgba(232,255,71,0.25);
    color: var(--accent);
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
    padding: 0.25rem 0.7rem; border-radius: 20px;
  }

  /* ── Card ── */
  .card {
    width: 100%; max-width: 480px;
    margin: 1.6rem 1rem 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  /* Category color strip */
  .card-stripe {
    height: 5px;
    background: linear-gradient(90deg, #e8ff47, #a8e63d);
  }

  .card-body { padding: 1.8rem 1.6rem 1.4rem; }

  /* Logo */
  .biz-logo {
    width: 64px; height: 64px; border-radius: 14px;
    object-fit: cover;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 1.2rem;
    overflow: hidden;
  }
  .biz-logo img { width: 100%; height: 100%; object-fit: cover; }

  .category-pill {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted2);
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.03em;
    padding: 0.2rem 0.7rem; border-radius: 20px;
    margin-bottom: 0.7rem;
  }

  .biz-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .biz-desc {
    color: var(--muted2); font-size: 0.88rem; line-height: 1.6;
    margin-bottom: 1.4rem;
  }

  /* Info rows */
  .info-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .info-row {
    display: flex; align-items: flex-start; gap: 0.85rem;
    padding: 0.9rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none; color: inherit;
    transition: border-color 0.18s, background 0.18s;
  }
  .info-row:hover { border-color: rgba(255,255,255,0.18); background: #1f1f1f; }

  .info-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(232,255,71,0.08);
    border: 1px solid rgba(232,255,71,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0; margin-top: 0.1rem;
  }
  .info-text-wrap { display: flex; flex-direction: column; gap: 0.15rem; }
  .info-label { font-size: 0.7rem; color: var(--muted); font-weight: 500; letter-spacing: 0.03em; }
  .info-value { font-size: 0.92rem; color: var(--text); line-height: 1.4; }

  /* CTA buttons */

  /* Complaint section */
  .complaint-box {
    width: 100%; max-width: 480px;
    margin: 1rem 1rem 0;
    background: rgba(255,107,107,0.05);
    border: 1px solid rgba(255,107,107,0.15);
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
  }
  .complaint-title {
    font-size: 0.8rem; font-weight: 600; color: #ff8888;
    margin-bottom: 0.5rem; letter-spacing: 0.03em;
  }
  .complaint-text {
    font-size: 0.82rem; color: var(--muted2); line-height: 1.6;
  }

  /* Footer */
  .footer-note {
    margin-top: 2.2rem;
    font-size: 0.72rem; color: var(--muted);
    text-decoration: none;
    display: block; text-align: center;
  }
  .footer-note:hover { color: var(--accent); }

  /* Loading / error */
  .state-msg {
    margin-top: 4rem; text-align: center; color: var(--muted2);
    font-size: 0.95rem; padding: 0 2rem;
  }

  /* ── Edit button (owner only) ── */
  .sticker-edit-btn {
    display: none;
    align-items: center; justify-content: center; gap: 0.5rem;
    width: 100%; max-width: 480px;
    padding: 0.7rem 1.4rem;
    margin: 0.75rem 1rem 0;
    background: transparent;
    border: 1px solid rgba(232,255,71,0.25);
    border-radius: 14px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
    cursor: pointer; letter-spacing: 0.01em;
    transition: background 0.2s, border-color 0.2s;
  }
  .sticker-edit-btn:hover { background: rgba(232,255,71,0.07); border-color: rgba(232,255,71,0.45); }

  /* ── Settings drawer ── */
  .st-drawer-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .st-drawer-overlay.open { display: block; }

  .st-drawer {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: #111; border-radius: 20px 20px 0 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 1.2rem 1.4rem 2rem;
    z-index: 1001;
    max-height: 82vh; overflow-y: auto;
  }
  .st-drawer-handle {
    width: 40px; height: 4px; background: rgba(255,255,255,0.15);
    border-radius: 2px; margin: 0 auto 1.2rem;
  }
  .st-drawer-title {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
    margin-bottom: 1.2rem;
  }
  .st-section-label {
    font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 0.6rem; margin-top: 1rem;
  }
  .st-section-label:first-of-type { margin-top: 0; }

  /* Gradient presets */
  .st-gradient-list { display: flex; flex-direction: column; gap: 0.3rem; }
  .st-preset-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.5rem 0.6rem; border-radius: 10px;
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .st-preset-item:hover { background: #1e1e1e; }
  .st-preset-item.active { background: rgba(232,255,71,0.07); }
  .st-preset-item.active::after { content:'✓'; position:absolute; right:0.8rem; color:var(--accent); font-size:0.8rem; font-weight:700; }
  .st-swatch { width: 38px; height: 38px; border-radius: 8px; flex-shrink:0; border:1px solid rgba(255,255,255,0.1); }
  .st-preset-name { font-size: 0.85rem; font-weight: 500; }
  .st-preset-desc { font-size: 0.7rem; color: var(--muted); }

  /* Color grid */
  .st-color-grid {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 0.5rem;
  }
  .st-color-dot {
    aspect-ratio: 1; border-radius: 10px; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .st-color-dot:hover { transform: scale(1.1); }
  .st-color-dot.active { border-color: rgba(255,255,255,0.8); }
  .st-color-dot.active::after { content:'✓'; color:#fff; font-size:1rem; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,0.5); }
  .st-color-label { font-size:0.65rem; color:var(--muted); text-align:center; margin-top:0.3rem; }

  /* Save button */
  .st-save-btn {
    width: 100%; padding: 0.9rem;
    background: var(--accent); color: #000;
    border: none; border-radius: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; margin-top: 1.4rem;
    transition: opacity 0.2s;
  }
  .st-save-btn:hover { opacity: 0.9; }
  .st-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .animated-swatch { animation: swatch-shift 3s ease infinite; background-size:200% 200% !important; }
  @keyframes swatch-shift { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }

  /* Background animations */
  .bg-graffiti-neon { background: linear-gradient(-45deg,#ff006e,#8338ec,#3a86ff,#06ffa5) !important; background-size:400% 400% !important; animation: gradient-shift 4s ease infinite; }
  @keyframes gradient-shift { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }
  .bg-pixel-glow { background:#050d05 !important; animation:pixel-bg-pulse 3s ease infinite; }
  @keyframes pixel-bg-pulse { 0%,100%{box-shadow:inset 0 0 80px rgba(0,255,65,0.1)}50%{box-shadow:inset 0 0 150px rgba(0,255,65,0.25)} }
  .bg-orbit-dots { background:#0a0a2e !important; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">NF<span>Craft</span></div>
  <div style="display:flex;align-items:center;gap:0.6rem;">
    <div class="sticker-badge">NFC STIKER</div>
    <select id="langSelect" onchange="changeLang(this.value)"
      style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0.28rem 0.5rem;font-family:'DM Sans',sans-serif;font-size:0.78rem;cursor:pointer;outline:none;">
      <option value="uz">UZ</option>
      <option value="en">EN</option>
      <option value="ru">RU</option>
    </select>
  </div>
</div>

<div id="mainContent" style="width:100%;max-width:480px;display:none;">

  <div class="card">
    <div class="card-stripe"></div>
    <div class="card-body">

      <div class="biz-logo" id="bizLogo">🏪</div>

      <div class="category-pill" id="categoryPill" style="display:none;"></div>
      <div class="biz-name" id="bizName">—</div>
      <div class="biz-desc" id="bizDesc" style="display:none;"></div>

      <div class="info-list">

        <a class="info-row" id="phoneRow" href="#">
          <div class="info-icon">📞</div>
          <div class="info-text-wrap">
            <span class="info-label" id="phoneLabel">Telefon</span>
            <span class="info-value" id="bizPhone">—</span>
          </div>
        </a>

        <a class="info-row" id="addressRow" href="#" target="_blank" rel="noopener" style="text-decoration:none;">
          <div class="info-icon">📍</div>
          <div class="info-text-wrap">
            <span class="info-label" id="addressLabel">Manzil</span>
            <span class="info-value" id="bizAddress">—</span>
          </div>
        </a>

        <div class="info-row" id="hoursRow" style="display:none;">
          <div class="info-icon">🕐</div>
          <div class="info-text-wrap">
            <span class="info-label" id="hoursLabel">Ish vaqti</span>
            <span class="info-value" id="bizHours">—</span>
          </div>
        </div>

      </div>


    </div>
  </div>


</div>

<!-- Owner-only edit button -->
<button class="sticker-edit-btn" id="stickerEditBtn" onclick="openStickerSettings()" style="display:none;">
  🎨 Dizaynni sozlash
</button>

<!-- Settings drawer overlay -->
<div class="st-drawer-overlay" id="stDrawerOverlay" onclick="closeStickerSettings()"></div>
<div class="st-drawer" id="stDrawer">
  <div class="st-drawer-handle"></div>
  <div class="st-drawer-title">🎨 Stiker dizayni</div>

  <div class="st-section-label">Gradient Presets</div>
  <div class="st-gradient-list" id="stGradientList"></div>

  <div class="st-section-label">Rang</div>
  <div class="st-color-grid" id="stColorGrid"></div>
  <!-- Custom color picker -->
  <div style="margin-top:0.5rem;">
    <button onclick="stToggleColorPicker()" style="display:flex;align-items:center;gap:0.6rem;width:100%;background:#1e1e1e;border:1.5px dashed rgba(255,255,255,0.15);border-radius:10px;padding:0.5rem 0.7rem;color:rgba(255,255,255,0.5);font-size:0.82rem;cursor:pointer;text-align:left;transition:border-color 0.2s;" onmouseover="this.style.borderColor='rgba(232,255,71,0.4)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.15)'">
      <div style="width:28px;height:28px;border-radius:7px;background:#111;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">+</div>
      <span>O'z rangingiz</span>
      <div id="stCustomColorDot" style="display:none;width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.3);flex-shrink:0;margin-left:auto;"></div>
    </button>
    <div id="stCustomColorPopup" style="display:none;margin-top:0.6rem;background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:0.85rem;">
      <div id="stColorAreaWrap" style="position:relative;width:100%;height:130px;border-radius:8px;overflow:hidden;cursor:crosshair;margin-bottom:0.75rem;user-select:none;"
        onmousedown="stCpStartDrag(event)" onmousemove="stCpDrag(event)"
        ontouchstart="stCpStartDrag(event)" ontouchmove="stCpDrag(event)">
        <div id="stColorAreaHue" style="position:absolute;inset:0;"></div>
        <div style="position:absolute;inset:0;background:linear-gradient(to right,#fff,transparent);"></div>
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent,#000);"></div>
        <div id="stColorAreaCursor" style="position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.5);transform:translate(-50%,-50%);pointer-events:none;"></div>
      </div>
      <input type="range" id="stHueSlider" min="0" max="359" value="0" oninput="stCpHueChange(this.value)" style="-webkit-appearance:none;appearance:none;width:100%;height:12px;border-radius:6px;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);outline:none;cursor:pointer;margin-bottom:0.7rem;display:block;">
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <div id="stHexPreview" style="width:30px;height:30px;border-radius:7px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);"></div>
        <input type="text" id="stHexInput" placeholder="#ff0000" maxlength="7" oninput="stCpHexInput(this.value)" style="flex:1;background:#1e1e1e;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:0.4rem 0.6rem;color:#fff;font-family:monospace;font-size:0.85rem;outline:none;">
        <button onclick="stApplyCustomColorFromPicker()" style="background:#e8ff47;color:#000;border:none;border-radius:8px;padding:0.4rem 0.85rem;font-weight:700;cursor:pointer;font-size:0.82rem;flex-shrink:0;">✓</button>
      </div>
    </div>
  </div>

  <button class="st-save-btn" id="stSaveBtn" onclick="saveStickerSettings()">Saqlash</button>
</div>

<div class="state-msg" id="loadingMsg">Yuklanmoqda...</div>
<div class="state-msg" id="errorMsg" style="display:none;">
  Stiker ma'lumotlari topilmadi.<br>
  <span style="font-size:0.8rem;color:var(--muted);">Iltimos, to'g'ri QR/NFC stikerdan foydalaning.</span>
</div>

<a class="footer-note" href="https://nfcraft.uz" target="_blank" rel="noopener">
  Powered by NFCraft · nfcraft.uz
</a>

<script>
const API = 'https://nfcraftbackend1-production.up.railway.app/api';

// ── Translations ──────────────────────────────────────────
const LANG_T = {
  uz: {
    phone: 'Telefon', address: 'Manzil', hours: 'Ish vaqti',
    complaint: '⚠️ Muammo yoki shikoyat bormi?',
    complaintFn: (name, addr) => `"${name}" do'konida mahsulotingiz bilan muammo yuzaga kelsa, yuqoridagi telefonga qo'ng'iroq qiling.\nManzil: ${addr}`,
    loading: 'Yuklanmoqda...', errorMain: 'Stiker ma\'lumotlari topilmadi.',
    errorSub: 'Iltimos, to\'g\'ri QR/NFC stikerdan foydalaning.',
  },
  en: {
    phone: 'Phone', address: 'Address', hours: 'Working hours',
    complaint: '⚠️ Problem or complaint?',
    complaintFn: (name, addr) => `If you have an issue with a product from "${name}", call the number above.\nAddress: ${addr}`,
    loading: 'Loading...', errorMain: 'Sticker info not found.',
    errorSub: 'Please use the correct QR/NFC sticker.',
  },
  ru: {
    phone: 'Телефон', address: 'Адрес', hours: 'Режим работы',
    complaint: '⚠️ Проблема или жалоба?',
    complaintFn: (name, addr) => `Если у вас проблема с товаром из "${name}", позвоните по номеру выше.\nАдрес: ${addr}`,
    loading: 'Загрузка...', errorMain: 'Данные стикера не найдены.',
    errorSub: 'Используйте правильный QR/NFC стикер.',
  },
};

let currentLang = localStorage.getItem('stickerLang') || 'uz';
let _cachedData  = null;

function getUUID() {
  const p = new URLSearchParams(location.search);
  return p.get('uuid') || p.get('id') || '';
}
function show(id)  { const el = document.getElementById(id); if (el) el.style.display = ''; }
function hide(id)  { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val ?? '—'; }

function applyLang() {
  const t = LANG_T[currentLang] || LANG_T.uz;
  document.getElementById('langSelect').value = currentLang;
  setText('phoneLabel',    t.phone);
  setText('addressLabel',  t.address);
  setText('hoursLabel',    t.hours);
  setText('complaintTitle', t.complaint);
  setText('loadingMsg',     t.loading);
  // Error message
  const errEl = document.getElementById('errorMsg');
  if (errEl) errEl.innerHTML = `${t.errorMain}<br><span style="font-size:0.8rem;color:var(--muted);">${t.errorSub}</span>`;
  // If data already loaded, update complaint text
  if (_cachedData) {
    setText('complaintText', t.complaintFn(_cachedData.businessName, _cachedData.address || ''));
  }
}

function changeLang(lang) {
  currentLang = lang;
  localStorage.setItem('stickerLang', lang);
  applyLang();
}

async function loadSticker() {
  applyLang();
  const uuid = getUUID();
  if (!uuid) { hide('loadingMsg'); show('errorMsg'); return; }

  try {
    const res  = await fetch(`${API}/sticker/info/${uuid}`);
    const data = await res.json();
    if (!res.ok || !data.businessName) { hide('loadingMsg'); show('errorMsg'); return; }

    _cachedData = data;
    const t = LANG_T[currentLang] || LANG_T.uz;

    setText('bizName', data.businessName);
    document.title = data.businessName + ' — NFCraft';

    const logoEl = document.getElementById('bizLogo');
    if (data.logo && data.logo.startsWith('data:')) {
      logoEl.innerHTML = `<img src="${data.logo}" alt="logo"/>`;
    } else {
      const icons = { supermarket:'🛒', dorixona:'💊', elektronika:'📱', oziq:'🥦', kiyim:'👕', restoran:'🍽', cafe:'☕', salon:'✂️' };
      const cat = (data.category || '').toLowerCase();
      logoEl.textContent = icons[cat] || '🏪';
    }

    if (data.category) { setText('categoryPill', data.category); show('categoryPill'); }
    if (data.description) { setText('bizDesc', data.description); show('bizDesc'); }

    const phone = data.phone || '';
    setText('bizPhone', phone);
    document.getElementById('phoneRow').href = 'tel:' + phone.replace(/\s/g, '');

    setText('bizAddress', data.address);
    if (data.address) {
      document.getElementById('addressRow').href = 'https://www.google.com/maps/search/' + encodeURIComponent(data.address);
    }

    if (data.workingHours) { setText('bizHours', data.workingHours); show('hoursRow'); }

    setText('complaintText', t.complaintFn(data.businessName, data.address || ''));

    // Apply saved visual settings
    if (data.bgType && data.bgValue) {
      _stBgType = data.bgType; _stBgValue = data.bgValue;
      applyStBgPreview();
    }

    // Show edit button only if current user owns this sticker
    const me = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (me && data.userId && me.id === data.userId) {
      document.getElementById('stickerEditBtn').style.display = 'flex';
    }

    hide('loadingMsg');
    show('mainContent');
  } catch (err) {
    hide('loadingMsg');
    show('errorMsg');
  }
}

// ── Sticker Settings ─────────────────────────────────────────
const ST_GRADIENT_PRESETS = [
  { id:'emerald-reserve',   name:'Emerald Reserve',   desc:'Deep forest',    swatch:'linear-gradient(135deg,#064e3b,#065f46)',         bg:'linear-gradient(135deg,#022c22,#064e3b 50%,#065f46)', text:'#a7f3d0' },
  { id:'midnight-obsidian', name:'Midnight Obsidian', desc:'Dark premium',   swatch:'linear-gradient(135deg,#0f172a,#1e293b)',         bg:'linear-gradient(135deg,#0a0f1e,#0f172a 50%,#1e293b)', text:'#e2e8f0' },
  { id:'golden-noir',       name:'Golden Noir',       desc:'Luxury gold',    swatch:'linear-gradient(135deg,#1a1208,#4a3820)',         bg:'linear-gradient(135deg,#0a0802,#2d1f05 30%,#4a3820 60%,#2d1f05)', text:'#d4a843' },
  { id:'velours-luxe',      name:'Velours Luxe',      desc:'Velvet luxury',  swatch:'linear-gradient(135deg,#4a0e2e,#722f57)',         bg:'linear-gradient(135deg,#2d0a1c,#4a0e2e 30%,#722f57 60%,#4a0e2e)', text:'#f0c9d5' },
  { id:'aurora-scriptum',   name:'Aurora Scriptum',   desc:'Deep purple',    swatch:'linear-gradient(135deg,#312e81,#7c3aed)',         bg:'linear-gradient(135deg,#1e1b4b,#312e81 30%,#4338ca 60%,#6d28d9)', text:'#e9d5ff' },
  { id:'sage-luxe',         name:'Sage Luxe',         desc:'Fresh green',    swatch:'linear-gradient(135deg,#74b49b,#a7c4bc)',         bg:'linear-gradient(135deg,#4a7c59,#74b49b 50%,#a7c4bc)', text:'#fff' },
  { id:'crimson-empire',    name:'Crimson Empire',    desc:'Imperial red',   swatch:'linear-gradient(135deg,#4a0a0a,#8b1a1a)',         bg:'linear-gradient(135deg,#2d0505,#4a0a0a 30%,#8b1a1a 60%,#4a0a0a)', text:'#fca5a5' },
  { id:'ocean-depths',      name:'Ocean Depths',      desc:'Deep sea',       swatch:'linear-gradient(135deg,#0c2340,#1a4a7a)',         bg:'linear-gradient(135deg,#060f1e,#0c2340 30%,#1a4a7a 60%,#0c2340)', text:'#bae6fd' },
  { id:'rose-gold',         name:'Rose Gold',         desc:'Luxury rose',    swatch:'linear-gradient(135deg,#c96a6a,#e8b4b8)',         bg:'linear-gradient(135deg,#5c1f1f,#c96a6a 40%,#e8b4b8 70%,#c96a6a)', text:'#fff' },
  { id:'jade-temple',       name:'Jade Temple',       desc:'Sacred jade',    swatch:'linear-gradient(135deg,#003d2b,#006b4a)',         bg:'linear-gradient(135deg,#001a12,#003d2b 40%,#006b4a 70%,#003d2b)', text:'#6ee7b7' },
  { id:'neon-sunset',       name:'Neon Sunset',       desc:'Electric horizon',swatch:'linear-gradient(135deg,#6f2232,#ff6b35)',        bg:'linear-gradient(135deg,#6f2232,#c06c84 30%,#f7c59f 60%,#ff6b35)', text:'#fff' },
  { id:'mahogany-dark',     name:'Mahogany Dark',     desc:'Rich dark wood',  swatch:'linear-gradient(135deg,#2d1206,#5c2a14)',        bg:'linear-gradient(135deg,#1a0a03,#2d1206 35%,#5c2a14 65%,#8b3a1e)', text:'#f5cba7' },
  { id:'graffiti-neon',     name:'Graffiti Neon',     desc:'Animated neon',  swatch:'linear-gradient(135deg,#ff006e,#8338ec,#3a86ff)', bg:null, text:'#fff', animClass:'bg-graffiti-neon' },
  { id:'pixel-glow',        name:'Pixel Glow',        desc:'Green matrix',   swatch:'linear-gradient(135deg,#050d05,#00ff41)',         bg:null, text:'#00ff41', animClass:'bg-pixel-glow' },
  { id:'orbit-dots',        name:'Orbit Dots',        desc:'Deep space',     swatch:'linear-gradient(135deg,#0a0a2e,#e8ff47)',         bg:null, text:'#e8ff47', animClass:'bg-orbit-dots' },
  { id:'cyber-punk',        name:'Cyber Punk',        desc:'Digital neon',   swatch:'linear-gradient(135deg,#0d0221,#ff00ff)',         bg:null, text:'#ff00ff', animClass:'bg-cyber-punk' },
  { id:'solar-flare',       name:'Solar Flare',       desc:'Cosmic fire',    swatch:'linear-gradient(135deg,#ff4500,#ffd700)',         bg:null, text:'#fff8e1', animClass:'bg-solar-flare' },
  { id:'neon-sunrise',      name:'Neon Sunrise',      desc:'Synthwave dawn',  swatch:'linear-gradient(135deg,#1a0533,#ff8c00)',        bg:null, text:'#ffe066', animClass:'bg-neon-sunrise' },
];

const ST_COLORS = [
  { id:'orange', name:'Orange', color:'#f97316', text:'#fff' },
  { id:'green',  name:'Green',  color:'#22c55e', text:'#fff' },
  { id:'blue',   name:'Blue',   color:'#3b82f6', text:'#fff' },
  { id:'pink',   name:'Pink',   color:'#ec4899', text:'#fff' },
  { id:'red',    name:'Red',    color:'#ef4444', text:'#fff' },
  { id:'yellow', name:'Yellow', color:'#eab308', text:'#000' },
  { id:'teal',   name:'Teal',   color:'#14b8a6', text:'#fff' },
  { id:'purple', name:'Purple', color:'#a855f7', text:'#fff' },
];

let _stBgType = null, _stBgValue = null, _stBgText = '#f0f0f0';

function initStickerSettings() {
  // Render gradient list
  document.getElementById('stGradientList').innerHTML = ST_GRADIENT_PRESETS.map(p => `
    <div class="st-preset-item" id="sgp-${p.id}" onclick="stSelectGradient('${p.id}')">
      <div class="st-swatch ${p.animClass ? 'animated-swatch' : ''}" style="background:${p.swatch};"></div>
      <div><div class="st-preset-name">${p.name}</div><div class="st-preset-desc">${p.desc}</div></div>
    </div>`).join('');

  // Render color grid
  document.getElementById('stColorGrid').innerHTML = ST_COLORS.map(c => `
    <div>
      <div class="st-color-dot" id="scp-${c.id}" onclick="stSelectColor('${c.id}')" style="background:${c.color};"></div>
      <div class="st-color-label">${c.name}</div>
    </div>`).join('');

  // Apply existing settings from loaded data
  if (_cachedData?.bgType && _cachedData?.bgValue) {
    if (_cachedData.bgType === 'GRADIENT' || _cachedData.bgType === 'ANIMATED') {
      document.getElementById(`sgp-${_cachedData.bgValue}`)?.classList.add('active');
    } else if (_cachedData.bgType === 'SOLID') {
      const c = ST_COLORS.find(x => x.color === _cachedData.bgValue);
      if (c) document.getElementById(`scp-${c.id}`)?.classList.add('active');
    }
  }
}

function stSelectGradient(id) {
  document.querySelectorAll('.st-preset-item.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.st-color-dot.active').forEach(el => el.classList.remove('active'));
  document.getElementById(`sgp-${id}`)?.classList.add('active');
  const p = ST_GRADIENT_PRESETS.find(x => x.id === id);
  if (!p) return;
  _stBgText = p.text;
  if (p.animClass) {
    _stBgType = 'ANIMATED'; _stBgValue = p.id;
  } else {
    _stBgType = 'GRADIENT'; _stBgValue = p.id;
  }
  applyStBgPreview();
}

function stSelectColor(id) {
  document.querySelectorAll('.st-preset-item.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.st-color-dot.active').forEach(el => el.classList.remove('active'));
  document.getElementById(`scp-${id}`)?.classList.add('active');
  const c = ST_COLORS.find(x => x.id === id);
  if (!c) return;
  _stBgType = 'SOLID'; _stBgValue = c.color; _stBgText = c.text;
  applyStBgPreview();
}

function applyStBgPreview() {
  // Live preview: apply to body immediately
  const ANIMATED_CLASSES = ['bg-graffiti-neon','bg-pixel-glow','bg-orbit-dots','bg-cyber-punk','bg-solar-flare','bg-neon-sunrise'];
  document.body.classList.remove(...ANIMATED_CLASSES);
  const GRADIENT_MAP = {
    'emerald-reserve':   'linear-gradient(135deg,#022c22,#064e3b 50%,#065f46)',
    'midnight-obsidian': 'linear-gradient(135deg,#0a0f1e,#0f172a 50%,#1e293b)',
    'golden-noir':       'linear-gradient(135deg,#0a0802,#2d1f05 30%,#4a3820 60%,#2d1f05)',
    'velours-luxe':      'linear-gradient(135deg,#2d0a1c,#4a0e2e 30%,#722f57 60%,#4a0e2e)',
    'aurora-scriptum':   'linear-gradient(135deg,#1e1b4b,#312e81 30%,#4338ca 60%,#6d28d9)',
    'sage-luxe':         'linear-gradient(135deg,#4a7c59,#74b49b 50%,#a7c4bc)',
    'crimson-empire':    'linear-gradient(135deg,#2d0505,#4a0a0a 30%,#8b1a1a 60%,#4a0a0a)',
    'ocean-depths':      'linear-gradient(135deg,#060f1e,#0c2340 30%,#1a4a7a 60%,#0c2340)',
    'rose-gold':         'linear-gradient(135deg,#5c1f1f,#c96a6a 40%,#e8b4b8 70%,#c96a6a)',
    'jade-temple':       'linear-gradient(135deg,#001a12,#003d2b 40%,#006b4a 70%,#003d2b)',
    'neon-sunset':       'linear-gradient(135deg,#6f2232,#c06c84 30%,#f7c59f 60%,#ff6b35)',
    'mahogany-dark':     'linear-gradient(135deg,#1a0a03,#2d1206 35%,#5c2a14 65%,#8b3a1e)',
  };
  if (_stBgType === 'ANIMATED') {
    const p = ST_GRADIENT_PRESETS.find(x => x.id === _stBgValue);
    document.body.style.background = '';
    if (p?.animClass) document.body.classList.add(p.animClass);
  } else if (_stBgType === 'GRADIENT') {
    document.body.style.background = GRADIENT_MAP[_stBgValue] || '#141414';
  } else if (_stBgType === 'SOLID') {
    document.body.style.background = _stBgValue;
  }
  document.body.style.color = _stBgText;
}

function stApplyCustomColor(hex) {
  document.querySelectorAll('.st-preset-item.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.st-color-dot.active').forEach(el => el.classList.remove('active'));
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const bright = (r*299 + g*587 + b*114)/1000;
  _stBgText = bright > 128 ? '#0a0a0a' : '#f0f0f0';
  _stBgType = 'SOLID'; _stBgValue = hex;
  const ANIM = ['bg-graffiti-neon','bg-pixel-glow','bg-orbit-dots','bg-cyber-punk','bg-solar-flare','bg-neon-sunrise'];
  document.body.classList.remove(...ANIM);
  document.body.style.background = hex;
  document.body.style.color = _stBgText;
  const dot = document.getElementById('stCustomColorDot');
  dot.style.display = 'block'; dot.style.background = hex;
}

// ── Sticker custom color picker ───────────────────────────────
let _stCpHue = 0, _stCpSat = 80, _stCpBri = 70, _stCpDragging = false;

function stHsbToHex(h, s, b) {
  s /= 100; b /= 100;
  const k = n => (n + h / 60) % 6;
  const f = n => b * (1 - s * Math.max(0, Math.min(k(n), 4 - k(n), 1)));
  return '#' + [f(5),f(3),f(1)].map(x => Math.round(x*255).toString(16).padStart(2,'0')).join('');
}

function stCpUpdateUI() {
  document.getElementById('stColorAreaHue').style.background = `hsl(${_stCpHue},100%,50%)`;
  const cursor = document.getElementById('stColorAreaCursor');
  cursor.style.left = _stCpSat + '%'; cursor.style.top = (100 - _stCpBri) + '%';
  const hex = stHsbToHex(_stCpHue, _stCpSat, _stCpBri);
  document.getElementById('stHexInput').value = hex;
  document.getElementById('stHexPreview').style.background = hex;
  cursor.style.background = hex;
}

function stCpGetPos(e, el) {
  const r = el.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: Math.max(0,Math.min(1,(cx-r.left)/r.width)), y: Math.max(0,Math.min(1,(cy-r.top)/r.height)) };
}

function stCpStartDrag(e) {
  e.preventDefault(); _stCpDragging = true;
  const p = stCpGetPos(e, document.getElementById('stColorAreaWrap'));
  _stCpSat = Math.round(p.x*100); _stCpBri = Math.round((1-p.y)*100); stCpUpdateUI();
}

function stCpDrag(e) {
  if (!_stCpDragging) return; e.preventDefault();
  const p = stCpGetPos(e, document.getElementById('stColorAreaWrap'));
  _stCpSat = Math.round(p.x*100); _stCpBri = Math.round((1-p.y)*100); stCpUpdateUI();
}

function stCpHueChange(val) { _stCpHue = parseInt(val); stCpUpdateUI(); }

function stCpHexInput(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    const r=parseInt(val.slice(1,3),16)/255, g=parseInt(val.slice(3,5),16)/255, b=parseInt(val.slice(5,7),16)/255;
    const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
    let h=0;
    if(d){if(max===r)h=((g-b)/d)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360;}
    _stCpHue=h; _stCpSat=max?Math.round(d/max*100):0; _stCpBri=Math.round(max*100); stCpUpdateUI();
  }
}

function stToggleColorPicker() {
  const p = document.getElementById('stCustomColorPopup');
  const isOpen = p.style.display !== 'none';
  p.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) stCpUpdateUI();
}

function stApplyCustomColorFromPicker() {
  stApplyCustomColor(stHsbToHex(_stCpHue, _stCpSat, _stCpBri));
  document.getElementById('stCustomColorPopup').style.display = 'none';
}

document.addEventListener('mouseup', () => { _stCpDragging = false; });
document.addEventListener('touchend', () => { _stCpDragging = false; });

function openStickerSettings() {
  initStickerSettings();
  document.getElementById('stDrawerOverlay').classList.add('open');
  document.getElementById('stDrawer').style.display = 'block';
}

function closeStickerSettings() {
  document.getElementById('stDrawerOverlay').classList.remove('open');
  document.getElementById('stDrawer').style.display = 'none';
}

async function saveStickerSettings() {
  const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
  if (!user?.token) { alert('Tizimga kiring'); return; }

  const btn = document.getElementById('stSaveBtn');
  btn.disabled = true; btn.textContent = 'Saqlanmoqda…';

  try {
    const res = await fetch(`${API}/sticker/info/${getUUID()}/settings`, {
      method: 'PATCH',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${user.token}` },
      body: JSON.stringify({ bgType: _stBgType, bgValue: _stBgValue })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Xato');
    closeStickerSettings();
  } catch (e) {
    alert('Xato: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Saqlash';
  }
}

loadSticker();
</script>
